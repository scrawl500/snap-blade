<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Snap Blade</title>
<style>
:root{
  --paper:#faf6ec; --paper2:#f1ebdb; --card:#fffdf6;
  --ink:#4b4237; --ink2:#8d8271; --line:#9a9285; --pencil:rgba(90,84,74,.8);
  --terra:#c96f4e; --must:#d9a53f; --sage:#8aa37b; --blue:#7f9bb3;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:"Georgia","Iowan Old Style","Noto Serif TC","PingFang TC",serif;
  background:
    repeating-linear-gradient(180deg, transparent 0 27px, rgba(127,155,179,.28) 27px 28.4px),
    linear-gradient(180deg,#fbf7ed,#f4eedd);
  color:var(--ink); overflow:hidden; height:100dvh;
  user-select:none; -webkit-user-select:none; touch-action:manipulation; overscroll-behavior:none;
}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}
.topbar{display:flex;align-items:center;gap:10px;padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;}
.topbar h2{margin:0;font-size:18px;letter-spacing:3px;flex:1;font-weight:700;}
.back{background:var(--card);border:1.6px solid var(--pencil);color:var(--ink);border-radius:7px 9px 6px 10px;
  width:42px;height:42px;font-size:19px;cursor:pointer;flex:none;
  box-shadow:2px 2px 0 rgba(75,66,55,.1);}
.hint{color:var(--ink2);text-align:center;margin:8px 18px;font-size:14px;line-height:1.7;}
.hint.small{font-size:12px;}
button{font-family:inherit;}
.big-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--card);border:1.6px solid var(--pencil);color:var(--ink);
  border-radius:8px 11px 7px 12px;padding:14px 18px;font-size:16px;font-weight:700;
  letter-spacing:1px;cursor:pointer;text-align:center;
  box-shadow:2.5px 3px 0 rgba(75,66,55,.12);
}
.big-btn:active{transform:translate(2px,2px);box-shadow:none;}
.big-btn.primary{background:#f3d98f;border-color:#cfa84e;}
.big-btn.danger{background:#e8b5a2;border-color:#c96f4e;}
.big-btn:disabled{opacity:.4;pointer-events:none;}
.big-btn.sm{padding:9px 8px;font-size:13px;flex:1;letter-spacing:0;}
.big-btn.on{background:#f0d1c2;border-color:var(--terra);outline:2px solid var(--terra);outline-offset:-1px;}
.row{display:flex;align-items:center;gap:10px;padding:6px 16px;}
.row.gap{gap:12px;justify-content:center;}
input[type=range]{flex:1;accent-color:var(--terra);touch-action:none;height:34px;}

/* HOME */
#scr-home{align-items:center;justify-content:flex-start;gap:15px;overflow-y:auto;padding:14px 0 calc(env(safe-area-inset-bottom) + 14px);}
#scr-home .logo{margin-top:auto;}
#scr-home #home-count{margin-bottom:auto;}
.home-spin{position:absolute;top:calc(env(safe-area-inset-top) + 10px);width:92px;height:92px;
  touch-action:none;z-index:2;cursor:grab;}
#home-spin-l{left:10px;transform:rotate(-4deg);}
#home-spin-r{right:10px;transform:rotate(3deg);}
.logo{ text-align:center;margin-bottom:10px;transform:rotate(-2deg);}
.logo .t1{
  font-family:"Bradley Hand","Segoe Script","Comic Sans MS",cursive;
  font-size:44px;font-weight:700;color:var(--ink);letter-spacing:1px;
  border-bottom:3px solid var(--terra);display:inline-block;padding:0 12px 2px;
}
.menu-btn{width:min(78vw,320px);position:relative;}
.menu-btn:nth-of-type(odd){transform:rotate(.7deg);}
.menu-btn:nth-of-type(even){transform:rotate(-.8deg);}
.menu-btn .ic{font-size:20px;font-style:normal;color:var(--terra);}
.menu-btn small{display:block;font-weight:400;font-size:11px;color:var(--ink2);letter-spacing:0;}
.menu-btn .lab{text-align:left;flex:1;}
#home-count{color:var(--ink2);font-size:12px;margin-top:6px;letter-spacing:1px;}

/* CAPTURE */
.cap-body{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:10px;padding-bottom:calc(env(safe-area-inset-bottom) + 20px);}
.cap-step{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;margin:auto 0;}
.cap-step[hidden]{display:none;}
#cap-canvas,#spin-canvas{
  max-width:min(94vw,430px);max-height:60dvh;width:auto;height:auto;
  border-radius:3px;border:9px solid #fffdf6;
  outline:1.6px solid var(--pencil);background:var(--paper2);touch-action:none;
  box-shadow:3px 4px 9px rgba(75,66,55,.18);
}
.spin-meter{width:min(70vw,300px);height:12px;background:var(--card);border:1.6px solid var(--pencil);border-radius:8px 10px 7px 9px;overflow:hidden;}
#spin-fill{height:100%;width:0%;background:repeating-linear-gradient(45deg,var(--must),var(--must) 8px,#e8c26a 8px,#e8c26a 16px);transition:width .1s;}
label.big-btn input{display:none;}

/* ARENA */
.arena-body{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:14px;
  padding:4px 16px calc(env(safe-area-inset-bottom) + 20px);}
.ar-sec{background:var(--card);border:1.5px solid var(--pencil);border-radius:6px 9px 5px 8px;
  padding:12px 14px;box-shadow:2.5px 3px 0 rgba(75,66,55,.1);display:flex;flex-direction:column;gap:8px;}
.ar-sec-t{font-weight:700;letter-spacing:2px;font-size:15px;}
#ar-search{flex:1;padding:10px;border-radius:5px 7px 4px 6px;border:1.5px solid var(--pencil);
  background:var(--paper2);color:var(--ink);font-size:14px;outline:none;font-family:inherit;}
.ar-thumbs{display:flex;gap:6px;align-items:center;}
.ar-thumbs img{width:46px;height:46px;object-fit:contain;filter:drop-shadow(1px 2px 2px rgba(75,66,55,.3));}
.ar-item{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px dashed var(--line);}
.ar-item:last-child{border-bottom:none;}
.ar-item .ai-info{flex:1;min-width:0;}
.ar-item .ai-n{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ar-item .ai-r{font-size:11px;color:var(--ink2);}
.ar-log{font-size:12px;color:var(--ink2);display:flex;flex-direction:column;gap:4px;}
.ar-log .lg{display:flex;justify-content:space-between;gap:8px;border-bottom:1px dashed rgba(154,146,133,.4);padding-bottom:3px;}
.ar-log .lg b.ok{color:var(--sage);} .ar-log .lg b.no{color:var(--terra);}

/* COLLECTION - sticker album */
.grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));
  gap:16px;padding:14px 18px calc(env(safe-area-inset-bottom) + 22px);align-content:start;}
.card{background:var(--card);border:1.4px solid var(--pencil);border-radius:3px 5px 4px 6px;padding:7px 7px 5px;
  display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;position:relative;
  box-shadow:2px 3px 7px rgba(75,66,55,.15);}
.card:nth-child(3n){transform:rotate(1.4deg);}
.card:nth-child(3n+1){transform:rotate(-1.2deg);}
.card:nth-child(3n+2){transform:rotate(.5deg);}
.card::after{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%) rotate(2deg);
  width:46px;height:14px;background:rgba(138,163,123,.42);}
.card img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(2px 3px 3px rgba(75,66,55,.32));}
.card .nm{font-size:12px;font-weight:700;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-family:"Bradley Hand","Segoe Script",cursive;}
.card .pw{font-size:10px;color:var(--ink2);}
.card.sel{outline:2.5px solid var(--terra);outline-offset:2px;}
.card .ord{position:absolute;top:2px;left:4px;background:var(--terra);color:#fffdf6;font-weight:900;
  width:20px;height:20px;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;z-index:1;}
.bottom-bar{padding:10px 16px calc(env(safe-area-inset-bottom) + 14px);display:flex;gap:10px;}
.bottom-bar .big-btn{flex:1;}

/* DETAIL */
#scr-detail .det-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;gap:8px;
  padding-bottom:calc(env(safe-area-inset-bottom) + 20px);}
#det-canvas{width:180px;height:180px;}
#det-radar{width:230px;height:210px;}
.stat-list{width:min(84vw,340px);display:flex;flex-direction:column;gap:5px;}
.stat-row{display:flex;align-items:center;gap:8px;font-size:12px;}
.stat-row .sn{width:64px;color:var(--ink2);flex:none;}
.stat-row .sv{width:30px;text-align:right;flex:none;font-weight:700;}
.sbar{flex:1;height:8px;background:var(--paper2);border:1px solid var(--pencil);border-radius:5px 7px 4px 6px;overflow:hidden;}
.sbar i{display:block;height:100%;border-radius:4px;background:repeating-linear-gradient(45deg,var(--sage),var(--sage) 6px,#a5ba97 6px,#a5ba97 12px);}

/* BATTLE */
#scr-battle{background:transparent;}
.hud{display:flex;align-items:stretch;gap:6px;padding:calc(env(safe-area-inset-top) + 8px) 10px 4px;}
.hud-side{flex:1;background:var(--card);border:1.5px solid var(--pencil);border-radius:6px 8px 5px 7px;padding:6px 8px;min-width:0;
  box-shadow:2px 2px 0 rgba(75,66,55,.09);}
.hud-side .hn{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hud-side .hb{display:flex;align-items:center;gap:5px;margin-top:3px;}
.hud-side .hb span{font-size:9px;color:var(--ink2);flex:none;width:22px;}
.hud-side .meter{flex:1;height:6px;background:rgba(109,103,92,.1);border:1px solid var(--pencil);border-radius:3px;overflow:hidden;}
.hud-side .meter i{display:block;height:100%;background:var(--blue);}
.hud-side .meter.integ i{background:var(--sage);}
.hud-side.enemy .meter i{background:var(--must);}
.hud-side.enemy .meter.integ i{background:var(--terra);}
.hud-score{display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;min-width:74px;}
.hud-score small{font-size:9px;color:var(--ink2);letter-spacing:1px;}
#battle-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0;}
#battle-canvas{max-width:100%;max-height:100%;touch-action:none;}
#battle-msg{position:absolute;left:0;right:0;top:38%;text-align:center;font-size:40px;font-weight:900;
  letter-spacing:2px;color:var(--terra);
  font-family:"Bradley Hand","Segoe Script","Comic Sans MS",cursive;
  pointer-events:none;opacity:0;transition:opacity .2s;transform:rotate(-2deg);}
#battle-msg.show{opacity:1;}
#battle-msg .sub{font-size:16px;color:var(--ink);display:block;margin-top:6px;letter-spacing:1px;
  font-family:"Georgia","Noto Serif TC",serif;}
#battle-exit{position:absolute;top:calc(env(safe-area-inset-top) + 6px);right:8px;z-index:5;
  background:var(--card);border:1.5px solid var(--pencil);color:var(--ink2);border-radius:8px 10px 7px 9px;
  padding:6px 10px;font-size:12px;cursor:pointer;display:none;}

/* MODAL - taped note card */
#modal{position:absolute;inset:0;background:rgba(75,66,55,.4);display:none;
  align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(2px);}
#modal.show{display:flex;}
.modal-box{background:var(--card);border:1.6px solid var(--pencil);border-radius:5px 8px 4px 7px;padding:24px 20px 20px;
  width:min(86vw,340px);display:flex;flex-direction:column;gap:12px;align-items:center;position:relative;
  box-shadow:4px 5px 0 rgba(75,66,55,.16);}
.modal-box::before{content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-3deg);
  width:70px;height:20px;background:rgba(217,165,63,.5);}
.modal-box h3{margin:0;font-size:18px;letter-spacing:2px;}
.modal-box input[type=text]{width:100%;padding:12px;border-radius:5px 7px 4px 6px;border:1.5px solid var(--pencil);
  background:var(--paper2);color:var(--ink);font-size:16px;text-align:center;outline:none;font-family:inherit;}
.modal-box .row.gap{width:100%;padding:0;}
.modal-box .big-btn{flex:1;}
.modal-box .mimg{width:110px;height:110px;object-fit:contain;background:var(--paper2);border:6px solid #fffdf6;
  outline:1px solid var(--line);box-shadow:2px 3px 6px rgba(75,66,55,.18);}
.modal-box .pick-grid{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.modal-box .pick-grid .card{width:92px;}
.win-stack{display:flex;justify-content:center;padding-top:0;}
.win-stack img{width:215px;height:215px;object-fit:contain;margin:-64px -60px -6px;
  filter:drop-shadow(4px 5px 6px rgba(75,66,55,.38));}
.win-stack img:nth-child(2){z-index:1;}
.modal-box .sticker{width:240px;height:240px;object-fit:contain;margin:-84px 0 -14px;
  filter:drop-shadow(4px 5px 6px rgba(75,66,55,.38));}

@keyframes popin{0%{transform:scale(.6);opacity:0;}100%{transform:scale(1);opacity:1;}}
.popin{animation:popin .35s cubic-bezier(.2,1.6,.4,1);}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="scr-home">
  <canvas id="home-spin-l" class="home-spin"></canvas>
  <canvas id="home-spin-r" class="home-spin"></canvas>
  <div class="logo popin">
    <div class="t1">Snap Blade</div>
  </div>
  <button class="menu-btn big-btn primary" data-nav="capture">
    <i class="ic">✂</i><span class="lab">捕獲陀螺<small>拍下任何東西,剪貼成戰鬥陀螺</small></span>
  </button>
  <button class="menu-btn big-btn" data-nav="collection">
    <i class="ic">✎</i><span class="lab">我的陀螺<small>翻開貼紙冊,看看收藏</small></span>
  </button>
  <button class="menu-btn big-btn" data-nav="arena">
    <i class="ic">⚑</i><span class="lab">競技場<small>發佈隊伍守擂・挑戰全世界的玩家</small></span>
  </button>
  <button class="menu-btn big-btn" data-nav="formal">
    <i class="ic">✦</i><span class="lab">正式對戰<small>3 對 3・先得 4 分獲勝</small></span>
  </button>
  <button class="menu-btn big-btn" data-nav="single">
    <i class="ic">➳</i><span class="lab">單場對戰<small>1 對 1・快速戰鬥</small></span>
  </button>
  <div id="home-count"></div>
</div>

<!-- CAPTURE -->
<div class="screen" id="scr-capture">
  <div class="topbar"><button class="back" data-back>←</button><h2>捕獲陀螺</h2></div>
  <div class="cap-body">
    <div class="cap-step" id="cap-step-pick">
      <div style="font-size:56px;line-height:1;color:var(--terra);" class="popin">✂</div>
      <p class="hint">拍下現實世界的任何東西<br>人物、寵物、建築、物品……<br>剪下來,做成你的戰鬥陀螺!</p>
      <p class="hint small">💡 iPhone 用戶:在「照片」App 長按物件即可複製去背圖,<br>存下來再從相簿選入,效果最好!</p>
      <label class="big-btn primary">📷 拍照
        <input type="file" id="cap-file-cam" accept="image/*" capture="environment">
      </label>
      <label class="big-btn">🖼 從相簿選擇
        <input type="file" id="cap-file-lib" accept="image/*">
      </label>
      <p class="hint small" id="cap-err" hidden style="color:var(--terra);"></p>
    </div>
    <div class="cap-step" id="cap-step-adjust" hidden>
      <canvas id="cap-canvas"></canvas>
      <div class="row gap" style="width:min(88vw,380px);" id="cap-tools">
        <button class="big-btn sm on" id="mk-fg">✏️ 圈主體</button>
        <button class="big-btn sm" id="mk-erase">🧽 擦除</button>
        <button class="big-btn sm" id="mk-restore">🖌 補回</button>
        <button class="big-btn sm" id="mk-clr">↺ 重畫</button>
      </div>
      <div class="row" style="width:min(88vw,380px);" id="cap-tol-row"><span style="font-size:13px;color:var(--ink2);flex:none;">範圍</span>
        <input type="range" id="cap-tol" min="8" max="100" value="50"></div>
      <div class="row" style="width:min(88vw,380px);" id="cap-brush-row"><span style="font-size:13px;color:var(--ink2);flex:none;">筆刷</span>
        <input type="range" id="cap-brush" min="1" max="9" value="3"></div>
      <p class="hint small" id="cap-adj-hint">在照片上塗抹主體,橘色輪廓線圈出的就是會被剪下的範圍</p>
      <div class="row gap">
        <button class="big-btn" id="cap-retake">重選</button>
        <button class="big-btn primary" id="cap-confirm">就是它!</button>
      </div>
    </div>
    <div class="cap-step" id="cap-step-spin" hidden>
      <p class="hint"><b>用手指快速轉動它!</b><br>轉得夠快就能完成捕獲</p>
      <canvas id="spin-canvas"></canvas>
      <div class="spin-meter"><div id="spin-fill"></div></div>
    </div>
  </div>
</div>

<!-- ARENA -->
<div class="screen" id="scr-arena">
  <div class="topbar"><button class="back" data-back>←</button><h2>競技場</h2></div>
  <div class="arena-body">
    <p class="hint small" id="ar-banner" hidden style="margin:0;padding:8px 10px;background:#f6e8c8;border:1.4px solid #cfa84e;border-radius:5px 7px 4px 6px;text-align:left;color:var(--ink);"></p>
    <div class="ar-sec">
      <div class="ar-sec-t">⚑ 我的隊伍</div>
      <div id="ar-mine"><p class="hint small" style="margin:6px 0;">讀取中…</p></div>
    </div>
    <div class="ar-sec">
      <div class="ar-sec-t">⚔ 挑戰競技場</div>
      <div class="row" style="padding:4px 0;gap:8px;">
        <input type="text" id="ar-search" placeholder="搜尋隊伍名稱" maxlength="12">
        <button class="big-btn sm" id="ar-search-btn" style="flex:none;">搜尋</button>
      </div>
      <button class="big-btn primary" id="ar-random" style="width:100%;">🎲 隨機配對</button>
      <div id="ar-results"></div>
    </div>
  </div>
</div>

<!-- COLLECTION -->
<div class="screen" id="scr-collection">
  <div class="topbar"><button class="back" data-back>←</button><h2>我的陀螺</h2><span id="col-count" style="color:var(--ink2);font-size:13px;"></span></div>
  <div class="grid" id="col-grid"></div>
</div>

<!-- DETAIL -->
<div class="screen" id="scr-detail">
  <div class="topbar"><button class="back" data-back-col>←</button><h2 id="det-name"></h2></div>
  <div class="det-body">
    <canvas id="det-canvas" width="360" height="360"></canvas>
    <canvas id="det-radar" width="460" height="420"></canvas>
    <div class="stat-list" id="det-stats"></div>
    <div class="row gap" style="width:min(84vw,340px);padding-top:10px;">
      <button class="big-btn" id="det-rename">改名</button>
      <button class="big-btn danger" id="det-delete">放生</button>
    </div>
  </div>
</div>

<!-- SELECT -->
<div class="screen" id="scr-select">
  <div class="topbar"><button class="back" data-back>←</button><h2 id="sel-title"></h2></div>
  <p class="hint" id="sel-hint"></p>
  <div class="grid" id="sel-grid"></div>
  <div class="bottom-bar"><button class="big-btn" id="sel-clear">重選</button><button class="big-btn primary" id="sel-go" disabled>出戰!</button></div>
</div>

<!-- BATTLE -->
<div class="screen" id="scr-battle">
  <div class="hud">
    <div class="hud-side" id="hud-p"><div class="hn"></div>
      <div class="hb"><span>轉速</span><div class="meter spin"><i></i></div></div>
      <div class="hb"><span>完整</span><div class="meter integ"><i></i></div></div>
    </div>
    <div class="hud-score"><small>BATTLE SCORE</small><span id="hud-score">0 - 0</span><small id="hud-round"></small></div>
    <div class="hud-side enemy" id="hud-e"><div class="hn"></div>
      <div class="hb"><span>轉速</span><div class="meter spin"><i></i></div></div>
      <div class="hb"><span>完整</span><div class="meter integ"><i></i></div></div>
    </div>
  </div>
  <div id="battle-wrap">
    <canvas id="battle-canvas" width="440" height="560"></canvas>
    <div id="battle-msg"></div>
  </div>
  <button id="battle-exit">退出對戰</button>
</div>

<!-- MODAL -->
<div id="modal"><div class="modal-box popin" id="modal-box"></div></div>

<script>
"use strict";
/* ============ UTIL / DB / NAV ============ */
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const clamp = (v,a,b) => Math.min(b,Math.max(a,v));
const rand = (a,b) => a + Math.random()*(b-a);
const irand = (a,b) => Math.floor(rand(a,b+1));
const TAU = Math.PI*2;
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

const DB_KEY = 'snapblade_db_v4';
let DB = { blades: [] };
function dbLoad(){

  // migrations: spin direction (75% right / 25% left) + battle records
  DB.blades.forEach(b=>{
    if(!b.spinDir) b.spinDir = Math.random()<.75 ? 'R' : 'L';
    if(b.wins==null){ b.wins=0; b.losses=0; }

/* ---- home decorative spinners: latest two blades, slow idle spin, flick to speed up ---- */
const homeSpin = { items:[], raf:0, last:0 };
function homeSpinRefresh(){
  const latest = [...DB.blades].filter(b=>!b.isEnemy)
    .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).slice(0,2);
  ['#home-spin-l','#home-spin-r'].forEach((sel,ix)=>{
    const cv = $(sel);
    const b = latest[ix];
    cv.style.display = b ? '' : 'none';
    if(!b) return;
    cv.width = 184; cv.height = 184;
    const dir = b.spinDir==='L' ? -1 : 1;
    const it = homeSpin.items[ix] = { blade:b, cv, rot:rand(0,TAU),
      base:dir*0.9, om:dir*0.9, dragging:false, prevA:0, prevT:0 };
    const angOf = ev=>{ const r=cv.getBoundingClientRect();
      return Math.atan2(ev.clientY-(r.top+r.height/2), ev.clientX-(r.left+r.width/2)); };
    cv.onpointerdown = ev=>{ ev.preventDefault(); cv.setPointerCapture(ev.pointerId);
      it.dragging=true; it.prevA=angOf(ev); it.prevT=performance.now(); };
    cv.onpointermove = ev=>{
      if(!it.dragging) return;
      ev.preventDefault();
      const a=angOf(ev), t=performance.now();
      let d=a-it.prevA; while(d>Math.PI)d-=TAU; while(d<-Math.PI)d+=TAU;
      const dt=Math.max(8,t-it.prevT)/1000;
      it.om = it.om*.5 + (d/dt)*.5;
      it.rot += d;
      it.prevA=a; it.prevT=t;
    };
    cv.onpointerup = cv.onpointercancel = ()=>{ it.dragging=false; };
  });
  homeSpin.items.length = Math.min(homeSpin.items.length, latest.length);
  if(!homeSpin.raf){ homeSpin.last=performance.now(); homeSpin.raf=requestAnimationFrame(homeSpinFrame); }
}
function homeSpinFrame(now){
  const dt = Math.min(.05,(now-homeSpin.last)/1000); homeSpin.last=now;
  const active = $('#scr-home').classList.contains('active');
  for(const it of homeSpin.items){
    if(!it) continue;
    if(!it.dragging){
      it.om = it.base + (it.om-it.base)*Math.exp(-0.55*dt); // ease back to idle speed
      it.rot += it.om*dt;
    }
    if(active){
      const ctx = it.cv.getContext('2d');
      ctx.clearRect(0,0,it.cv.width,it.cv.height);
      const im = bladeImage(it.blade);
      if(im.complete) drawBladeSprite(ctx, im, 92, 92, it.rot, 78, Math.abs(it.om)>6);
    }
  }
  homeSpin.raf = requestAnimationFrame(homeSpinFrame);
}

/* image cache: blade.id -> Image */
const imgCache = {};
function bladeImage(blade){
  if(imgCache[blade.id] && imgCache[blade.id].complete) return imgCache[blade.id];
  if(!imgCache[blade.id]){ const im = new Image();
    if(/^https?:/.test(blade.img)) im.crossOrigin='anonymous'; // CDN 圖:避免污染 canvas(碎裂系統要讀像素)
    im.src = blade.img; imgCache[blade.id] = im; }
  return imgCache[blade.id];
}
function preloadBlades(list){
  return Promise.all(list.map(b=>new Promise(res=>{
    const im = bladeImage(b);
    if(im.complete) return res();
    im.onload = ()=>res(); im.onerror = ()=>res();
  })));
}

/* tiny WebAudio sfx */
let AC = null;
function ac(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function sfx(type){
  const c = ac(); if(!c) return;
  if(c.state==='suspended') c.resume();
  const t = c.currentTime, o = c.createOscillator(), g = c.createGain();
  o.connect(g); g.connect(c.destination);
  if(type==='hit'){ o.type='square'; o.frequency.setValueAtTime(rand(180,260),t);
    g.gain.setValueAtTime(.08,t); g.gain.exponentialRampToValueAtTime(.001,t+.08); o.start(t); o.stop(t+.09);
  }else if(type==='launch'){ o.type='sawtooth'; o.frequency.setValueAtTime(90,t);
    o.frequency.exponentialRampToValueAtTime(700,t+.4);
    g.gain.setValueAtTime(.06,t); g.gain.exponentialRampToValueAtTime(.001,t+.45); o.start(t); o.stop(t+.5);
  }else if(type==='win'){ [523,659,784,1046].forEach((f,i)=>{
      const o2=c.createOscillator(), g2=c.createGain(); o2.connect(g2); g2.connect(c.destination);
      o2.type='triangle'; o2.frequency.value=f; const st=t+i*.12;
      g2.gain.setValueAtTime(.001,st); g2.gain.linearRampToValueAtTime(.09,st+.02);
      g2.gain.exponentialRampToValueAtTime(.001,st+.3); o2.start(st); o2.stop(st+.32); });
    return;
  }else if(type==='count'){ o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(.07,t); g.gain.exponentialRampToValueAtTime(.001,t+.12); o.start(t); o.stop(t+.13);
  }else if(type==='burst'){ o.type='sawtooth'; o.frequency.setValueAtTime(400,t);
    o.frequency.exponentialRampToValueAtTime(40,t+.5);
    g.gain.setValueAtTime(.12,t); g.gain.exponentialRampToValueAtTime(.001,t+.5); o.start(t); o.stop(t+.55);
  }
}

/* draw a blade (image + glow ring) onto ctx at x,y with rotation & pixel radius */
function drawBladeSprite(ctx, imgOrCanvas, x, y, rot, radPx, spinning){
  const s = radPx/120; // stored images: 256px canvas, max radius 120px
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(rot);
  if(spinning){ // motion ghost
    ctx.globalAlpha = .25;
    ctx.rotate(-.35); ctx.drawImage(imgOrCanvas,-128*s,-128*s,256*s,256*s);
    ctx.rotate(.7);  ctx.drawImage(imgOrCanvas,-128*s,-128*s,256*s,256*s);
    ctx.rotate(-.35); ctx.globalAlpha = 1;
  }
  ctx.drawImage(imgOrCanvas,-128*s,-128*s,256*s,256*s);
  ctx.restore();
}
/* ============ MASK ANALYSIS & STATS ============ */
const PROF_N = 96; // radial profile resolution

/* ---- perceptual segmentation: Lab colour space + k-means bg/fg models ---- */
const LAB_LT = (()=>{ const t=new Float32Array(256);
  for(let i=0;i<256;i++){ const c=i/255; t[i]= c>0.04045 ? Math.pow((c+0.055)/1.055,2.4) : c/12.92; }
  return t; })();
function buildLab(data,w,h){
  const n=w*h, L=new Float32Array(n), A=new Float32Array(n), B=new Float32Array(n);
  const f=t=> t>0.008856 ? Math.cbrt(t) : (7.787*t + 16/116);
  for(let i=0;i<n;i++){
    const r=LAB_LT[data[i*4]], g=LAB_LT[data[i*4+1]], b=LAB_LT[data[i*4+2]];
    const X=f((r*0.4124+g*0.3576+b*0.1805)/0.95047);
    const Y=f( r*0.2126+g*0.7152+b*0.0722);
    const Z=f((r*0.0193+g*0.1192+b*0.9505)/1.08883);
    L[i]=116*Y-16; A[i]=500*(X-Y); B[i]=200*(Y-Z);
  }
  return {L,A,B};
}
const labD2=(p,c)=>{ const a=p[0]-c[0], b=(p[1]-c[1])*1.25, e=(p[2]-c[2])*1.25; return a*a+b*b+e*e; };
function kmeans(pts,k,iters=8){
  if(!pts.length) return [[0,0,0]];
  k=Math.min(k,pts.length);
  const C=[pts[(pts.length/2)|0].slice()];
  const step=Math.max(1,(pts.length/500)|0);
  while(C.length<k){ // k-means++ style: farthest point
    let bi=0,bd=-1;
    for(let i=0;i<pts.length;i+=step){
      let m=1e18; for(const c of C){ const d=labD2(pts[i],c); if(d<m)m=d; }
      if(m>bd){bd=m;bi=i;}
    }
    C.push(pts[bi].slice());
  }
  for(let t=0;t<iters;t++){
    const sum=C.map(()=>[0,0,0,0]);
    for(const p of pts){ let bi=0,m=1e18;
      for(let j=0;j<C.length;j++){ const d=labD2(p,C[j]); if(d<m){m=d;bi=j;} }
      const s=sum[bi]; s[0]+=p[0]; s[1]+=p[1]; s[2]+=p[2]; s[3]++;
    }
    for(let j=0;j<C.length;j++) if(sum[j][3]) C[j]=[sum[j][0]/sum[j][3],sum[j][1]/sum[j][3],sum[j][2]/sum[j][3]];
  }
  return C;
}
function minDistMap(L,A,B,n,centers){
  const out=new Float32Array(n);
  for(let i=0;i<n;i++){
    let m=1e18;
    for(const c of centers){
      const a=L[i]-c[0], b=(A[i]-c[1])*1.25, e=(B[i]-c[2])*1.25;
      const d=a*a+b*b+e*e; if(d<m)m=d;
    }
    out[i]=Math.sqrt(m);
  }
  return out;
}
function majoritySmooth(mask,w,h){
  const out=new Uint8Array(mask);
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    const i=y*w+x;
    const s=mask[i]+mask[i-1]+mask[i+1]+mask[i-w]+mask[i+w]
           +mask[i-w-1]+mask[i-w+1]+mask[i+w-1]+mask[i+w+1];
    out[i]= s>=5 ? 1 : 0;
  }
  mask.set(out);
}
function collectPts(L,A,B,w,h,pts,rad){
  const out=[]; const seen=new Uint8Array(w*h);
  for(const p of pts){
    for(let dy=-rad;dy<=rad;dy++)for(let dx=-rad;dx<=rad;dx++){
      if(dx*dx+dy*dy>rad*rad) continue;
      const x=p.x+dx, y=p.y+dy;
      if(x<0||y<0||x>=w||y>=h) continue;
      const i=y*w+x; if(seen[i]) continue; seen[i]=1;
      out.push([L[i],A[i],B[i]]);
    }
  }
  return out;
}
function stampPts(mask,w,h,pts,rad,val){
  for(const p of pts){
    for(let dy=-rad;dy<=rad;dy++)for(let dx=-rad;dx<=rad;dx++){
      if(dx*dx+dy*dy>rad*rad) continue;
      const x=p.x+dx, y=p.y+dy;
      if(x<0||y<0||x>=w||y>=h) continue;
      mask[y*w+x]=val;
    }
  }
}
/* unified segmentation:
   - bg colour model = photo border ring + user's background scribbles
   - fg colour model = user's subject scribbles (if any)
   tol slider biases the fg/bg decision boundary */
function segmentMask(data,w,h,tol,fgPts,bgPts){
  const n=w*h;
  const {L,A,B}=buildLab(data,w,h);
  const rad=Math.max(3, Math.round(Math.min(w,h)*0.03));
  const bgSamples=[];
  const ring=2;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    if(x<ring||y<ring||x>=w-ring||y>=h-ring){ const i=y*w+x; bgSamples.push([L[i],A[i],B[i]]); }
  }
  const hasBg = bgPts && bgPts.length;
  const hasFg = fgPts && fgPts.length;
  if(hasBg) bgSamples.push(...collectPts(L,A,B,w,h,bgPts,rad));
  const bgC=kmeans(bgSamples, hasBg?7:5, 8);
  const bgD=minDistMap(L,A,B,n,bgC);
  const mask=new Uint8Array(n);
  if(hasFg){
    const fgSamples=collectPts(L,A,B,w,h,fgPts,rad);
    const k=Math.min(6, Math.max(2, Math.ceil(fgSamples.length/80)));
    const fgC=kmeans(fgSamples,k,8);
    const fgD=minDistMap(L,A,B,n,fgC);
    const bias=(tol-50)*0.14;          // slider >50 keeps more, <50 trims more
    for(let i=0;i<n;i++) mask[i]= (fgD[i] < bgD[i]+bias) ? 1 : 0;
  } else {
    const thr=5.5+tol*0.32;
    for(let i=0;i<n;i++) mask[i]= bgD[i]>thr ? 1 : 0;
  }
  majoritySmooth(mask,w,h);
  majoritySmooth(mask,w,h);
  // user scribbles are ground truth: always honour them
  if(hasFg) stampPts(mask,w,h,fgPts,rad,1);
  if(hasBg) stampPts(mask,w,h,bgPts,rad,0);
  return mask;
}
function alphaMaskFrom(data, w, h){
  const mask = new Uint8Array(w*h);
  for(let i=0;i<w*h;i++) mask[i] = data[i*4+3] > 30 ? 1 : 0;
  return mask;
}
/* keep the component containing the seed (if given & valid), else largest; fill holes */
function cleanMask(mask, w, h, seeds){
  const lab = new Int32Array(w*h).fill(-1);
  const qs = new Int32Array(w*h);
  let best=-1, bestN=0, nl=0;
  const counts=[];
  for(let s=0;s<w*h;s++){
    if(!mask[s] || lab[s]>=0) continue;
    let head=0, tail=0; qs[tail++]=s; lab[s]=nl; let n=0;
    while(head<tail){ const i=qs[head++]; n++;
      const x=i%w, y=(i/w)|0;
      if(x>0&&mask[i-1]&&lab[i-1]<0){lab[i-1]=nl;qs[tail++]=i-1;}
      if(x<w-1&&mask[i+1]&&lab[i+1]<0){lab[i+1]=nl;qs[tail++]=i+1;}
      if(y>0&&mask[i-w]&&lab[i-w]<0){lab[i-w]=nl;qs[tail++]=i-w;}
      if(y<h-1&&mask[i+w]&&lab[i+w]<0){lab[i+w]=nl;qs[tail++]=i+w;}
    }
    counts[nl]=n;
    if(n>bestN){bestN=n;best=nl;} nl++;
  }
  if(best<0) return 0;
  // prefer the (largest) component the user scribbled on
  if(seeds && seeds.length){
    let sb=-1, sn=0;
    for(const p of seeds){
      const si = clamp(p.y,0,h-1)*w + clamp(p.x,0,w-1);
      const sl = lab[si];
      if(sl>=0 && counts[sl]>sn){ sb=sl; sn=counts[sl]; }
    }
    if(sb>=0 && sn>=60){ best=sb; bestN=sn; }
  }
  for(let i=0;i<w*h;i++) mask[i] = (mask[i] && lab[i]===best) ? 1 : 0;
  // fill holes: bg reachable from border stays bg, the rest becomes subject
  const out = new Uint8Array(w*h); let head=0, tail=0;
  const pushB=i=>{ if(!out[i]&&!mask[i]){out[i]=1;qs[tail++]=i;} };
  for(let x=0;x<w;x++){ pushB(x); pushB((h-1)*w+x); }
  for(let y=0;y<h;y++){ pushB(y*w); pushB(y*w+w-1); }
  while(head<tail){ const i=qs[head++]; const x=i%w,y=(i/w)|0;
    if(x>0)pushB(i-1); if(x<w-1)pushB(i+1); if(y>0)pushB(i-w); if(y<h-1)pushB(i+w); }
  for(let i=0;i<w*h;i++) if(!mask[i] && !out[i]) mask[i]=1;
  return bestN;
}
/* geometry metrics from mask */
function analyzeMask(mask, w, h, data){
  // centre of rotation = centre of mass of the final cutout (alpha-weighted),
  // not the centre of the original photo
  let area=0, cx=0, cy=0, msum=0;
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){ const i=y*w+x; if(mask[i]){
    const m = data ? Math.max(.15, data[i*4+3]/255) : 1;
    area++; msum+=m; cx+=x*m; cy+=y*m;
  } }
  if(area<60) return null;
  cx/=msum; cy/=msum;
  let perim=0;
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){ const i=y*w+x; if(!mask[i])continue;
    if(x===0||x===w-1||y===0||y===h-1||!mask[i-1]||!mask[i+1]||!mask[i-w]||!mask[i+w]) perim++; }
  // radial profile: furthest subject pixel along each ray
  const prof = new Float32Array(PROF_N);
  const maxScan = Math.hypot(w,h);
  for(let k=0;k<PROF_N;k++){
    const a=k/PROF_N*TAU, dx=Math.cos(a), dy=Math.sin(a);
    let far=1;
    for(let r=1;r<maxScan;r+=1){
      const x=(cx+dx*r)|0, y=(cy+dy*r)|0;
      if(x<0||y<0||x>=w||y>=h) break;
      if(mask[y*w+x]) far=r;
    }
    prof[k]=far;
  }
  let maxR=1, avgR=0;
  for(let k=0;k<PROF_N;k++){ if(prof[k]>maxR)maxR=prof[k]; avgR+=prof[k]; }
  avgR/=PROF_N;
  const norm = new Float32Array(PROF_N);
  for(let k=0;k<PROF_N;k++) norm[k]=prof[k]/maxR;
  // circularity 4πA/P²
  const circ = clamp(4*Math.PI*area/(perim*perim), 0, 1);
  // jaggedness: total radial variation
  let tv=0; for(let k=0;k<PROF_N;k++) tv+=Math.abs(prof[(k+1)%PROF_N]-prof[k]);
  const jag = clamp(tv/(avgR*5.5), 0, 1);
  // rotational symmetry: best autocorrelation at 2..6-fold (flat profile = perfectly symmetric)
  let mean=0; for(let k=0;k<PROF_N;k++) mean+=norm[k]; mean/=PROF_N;
  let varr=0; for(let k=0;k<PROF_N;k++) varr+=(norm[k]-mean)**2;
  let sym;
  if(varr/PROF_N < 3e-4) sym = 1;
  else {
    sym=0;
    for(const f of [2,3,4,5,6]){
      const s=Math.round(PROF_N/f); let c=0;
      for(let k=0;k<PROF_N;k++) c+=(norm[k]-mean)*(norm[(k+s)%PROF_N]-mean);
      sym=Math.max(sym, c/varr);
    }
    sym=clamp((sym+.15)/1.05,0,1);
  }
  const areaFrac = clamp(area/(Math.PI*maxR*maxR),0,1); // density / solidity
  return {cx,cy,maxR,avgR:avgR/maxR,area,circ,jag,sym,areaFrac,norm:[...norm]};
}
/* build 256px cutout canvas, centered on centroid, maxR -> 120px, cyan outline glow */
function buildCutout(srcCanvas, mask, an){
  const w=srcCanvas.width, h=srcCanvas.height;
  const cut=document.createElement('canvas'); cut.width=w; cut.height=h;
  const cctx=cut.getContext('2d');
  cctx.drawImage(srcCanvas,0,0);
  const id=cctx.getImageData(0,0,w,h);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const i=y*w+x;
    if(!mask[i]){ id.data[i*4+3]=0; continue; }
    // 1px edge feather: alpha follows the local mask density
    if(x>0&&x<w-1&&y>0&&y<h-1){
      const s=mask[i-1]+mask[i+1]+mask[i-w]+mask[i+w]
             +mask[i-w-1]+mask[i-w+1]+mask[i+w-1]+mask[i+w+1];
      if(s<8) id.data[i*4+3]=Math.round(255*(s+1)/9);
    }
  }
  cctx.putImageData(id,0,0);
  const out=document.createElement('canvas'); out.width=256; out.height=256;
  const octx=out.getContext('2d');
  const s=120/an.maxR;
  octx.save(); octx.translate(128,128); octx.scale(s,s); octx.translate(-an.cx,-an.cy);
  // outline: white hand-cut sticker border (stamp silhouette 8 directions)
  const sil=document.createElement('canvas'); sil.width=w; sil.height=h;
  const sctx=sil.getContext('2d');
  sctx.drawImage(cut,0,0);
  sctx.globalCompositeOperation='source-in';
  sctx.fillStyle='#fffdf6'; sctx.fillRect(0,0,w,h);
  const o=Math.max(2.5, an.maxR*0.05);
  for(let k=0;k<8;k++){ const a=k/8*TAU;
    octx.drawImage(sil, Math.cos(a)*o, Math.sin(a)*o); }
  octx.drawImage(cut,0,0);
  octx.restore();
  return out;
}
/* stats from metrics + innate */
function computeStats(an, innate){
  const atk = clamp(12 + an.jag*62 + (1-an.circ)*18 + innate.power*0.22, 5, 100);
  const def = clamp(8 + an.circ*52 + an.areaFrac*18 + innate.tough*0.26, 5, 100);
  const sta = clamp(8 + an.sym*46 + an.circ*16 + innate.weight*0.30, 5, 100);
  const wgt = clamp(innate.weight*0.55 + an.areaFrac*52, 5, 100);
  const tgh = clamp(innate.tough*0.62 + an.areaFrac*40, 5, 100);
  const pow = clamp(innate.power*0.8 + an.jag*20, 5, 100);
  const r = v=>Math.round(v);
  return {attack:r(atk), defense:r(def), stamina:r(sta), power:r(pow), weight:r(wgt), tough:r(tgh)};
}
function recordText(b){
  const w=b.wins||0, l=b.losses||0, t=w+l;
  return t ? `${w}勝${l}敗 (${Math.round(w/t*100)}%)` : '尚無戰績';
}
const STAT_DEFS = [
  ['attack','攻擊'],['defense','防禦'],['stamina','持久'],
  ['power','力量'],['weight','重量'],['tough','韌性']
];

/* radar chart */
function drawRadar(canvas, stats){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2+6, R=Math.min(W,H)*0.335;
  ctx.clearRect(0,0,W,H);
  const pt=(i,f)=>{ const a=-Math.PI/2+i/6*TAU; return [cx+Math.cos(a)*R*f, cy+Math.sin(a)*R*f]; };
  for(let g=1;g<=4;g++){ ctx.beginPath();
    for(let i=0;i<6;i++){ const [x,y]=pt(i,g/4); i?ctx.lineTo(x,y):ctx.moveTo(x,y); }
    ctx.closePath(); ctx.strokeStyle='rgba(141,127,106,'+(g===4?'.55':'.22')+')'; ctx.lineWidth=g===4?2:1; ctx.stroke(); }
  for(let i=0;i<6;i++){ const [x,y]=pt(i,1); ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y);
    ctx.strokeStyle='rgba(141,127,106,.22)'; ctx.stroke(); }
  ctx.beginPath();
  STAT_DEFS.forEach(([k],i)=>{ const [x,y]=pt(i, clamp(stats[k],0,100)/100); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
  ctx.closePath();
  ctx.fillStyle='rgba(201,111,78,.28)'; ctx.fill();
  ctx.strokeStyle='#c96f4e'; ctx.lineWidth=2.5; ctx.stroke();
  ctx.font='700 '+Math.round(W*0.052)+'px Georgia,serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  STAT_DEFS.forEach(([k,lab],i)=>{ const [x,y]=pt(i,1.22);
    ctx.fillStyle='#8d7f6a'; ctx.fillText(lab,x,y-Math.round(W*0.026));
    ctx.fillStyle='#4b4237'; ctx.fillText(stats[k],x,y+Math.round(W*0.032)); });
}
/* full pipeline: source canvas -> blade object (not yet saved) */
function stampPts(mask, w, h, pts, val, alphaData){
  for(const p of pts){
    const r = p.r || 6, r2 = r*r;
    const x0=Math.max(0,p.x-r), x1=Math.min(w-1,p.x+r);
    const y0=Math.max(0,p.y-r), y1=Math.min(h-1,p.y+r);
    for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){
      if((x-p.x)**2+(y-p.y)**2 > r2) continue;
      const i=y*w+x;
      if(val && alphaData && alphaData[i*4+3]<30) continue; // 補回時不納入原圖透明像素
      mask[i]=val;
    }
  }
}
function forgeBlade(srcCanvas, {useAlpha=false, tol=50, innate=null, name='', isEnemy=false, spinDir=null, fg=null, bg=null, keepMask=false, edits=null} = {}){
  const w=srcCanvas.width, h=srcCanvas.height;
  const data=srcCanvas.getContext('2d').getImageData(0,0,w,h).data;
  const mask = useAlpha ? alphaMaskFrom(data,w,h)
             :            segmentMask(data,w,h,tol,fg,bg);
  // 擦除先套用:切斷主體與雜物的連結後,cleanMask 會自動丟掉小碎塊
  if(edits && edits.erase && edits.erase.length) stampPts(mask,w,h,edits.erase,0);
  const cleaned = cleanMask(mask,w,h,fg);
  if(!cleaned && !(edits && edits.restore && edits.restore.length)) return null;
  // 補回後套用:避免被 cleanMask 當成孤島清掉
  if(edits && edits.restore && edits.restore.length) stampPts(mask,w,h,edits.restore,1, useAlpha?data:null);
  const an=analyzeMask(mask,w,h,data);
  if(!an || an.maxR<8) return null;
  const cut=buildCutout(srcCanvas,mask,an);
  innate = innate || {power:irand(20,95), weight:irand(20,95), tough:irand(20,95)};
  const stats=computeStats(an,innate);
  const blade = {
    id:uid(), name, createdAt:Date.now(), isEnemy,
    spinDir: spinDir || (Math.random()<.75 ? 'R' : 'L'),
    wins:0, losses:0,
    img:cut.toDataURL('image/png'),
    prof:an.norm, innate, stats,
    metrics:{circ:+an.circ.toFixed(3), jag:+an.jag.toFixed(3), sym:+an.sym.toFixed(3), areaFrac:+an.areaFrac.toFixed(3)}
  };
  if(keepMask){ blade._mask = mask; blade._an = {cx:an.cx, cy:an.cy, maxR:an.maxR}; }
  return blade;
}
/* subject-only (or hole-only) canvas at source resolution, in原位 */
function inPlaceCut(srcCanvas, mask, hole){
  const w=srcCanvas.width, h=srcCanvas.height;
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const x=c.getContext('2d'); x.drawImage(srcCanvas,0,0);
  const id=x.getImageData(0,0,w,h);
  for(let i=0;i<w*h;i++){ const keep = hole ? !mask[i] : mask[i]; if(!keep) id.data[i*4+3]=0; }
  x.putImageData(id,0,0);
  return c;
}
function drawMaskContour(ctx, mask, w, h, scale, color){
  ctx.fillStyle=color;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const i=y*w+x; if(!mask[i]) continue;
    if(x===0||y===0||x===w-1||y===h-1||!mask[i-1]||!mask[i+1]||!mask[i-w]||!mask[i+w]){
      ctx.fillRect(x*scale-1, y*scale-1, scale+2, scale+2);
    }
  }
}

function capBrushRad(){
  const base = Math.max(2, Math.min(cap.src.width,cap.src.height)*0.012);

function capPtFromEvent(ev){
  const r = ev.currentTarget.getBoundingClientRect();
  const x = Math.round((ev.clientX-r.left)/r.width * cap.src.width);
  const y = Math.round((ev.clientY-r.top)/r.height * cap.src.height);

}
let capPainting = false, capLastPt = null;
function capAddPt(p){
  const arr = cap.mode==='fg' ? cap.fg : cap.mode==='erase' ? cap.erase : cap.restore;
  const rad = capBrushRad();
  if(capLastPt && (p.x-capLastPt.x)**2+(p.y-capLastPt.y)**2 < (rad*0.5)**2) return;
  arr.push({x:p.x, y:p.y, r:rad}); capLastPt = p;

/* --- spin-to-capture --- */
function startSpinTest(){
  const cv = $('#spin-canvas');
  const w = cap.src.width, h = cap.src.height;
  cv.width = w*2; cv.height = h*2;
  const ctx = cv.getContext('2d');
  const an = cap.blade._an, mask = cap.blade._mask;
  const cx = an.cx*2, cy = an.cy*2, R = an.maxR*2;
  // static base: the photo, with a checkerboard (transparency pattern) showing
  // through the hole where the subject was cut out
  const base = document.createElement('canvas'); base.width = w*2; base.height = h*2;
  {
    const b = base.getContext('2d');
    const cell = 12;
    for(let yy=0; yy<h*2; yy+=cell) for(let xx=0; xx<w*2; xx+=cell){
      b.fillStyle = (((xx+yy)/cell)%2) ? '#c9c9c9' : '#f3f3f3';
      b.fillRect(xx,yy,cell,cell);
    }
    b.drawImage(inPlaceCut(cap.src, mask, true), 0, 0, w*2, h*2);
  }
  const cut = inPlaceCut(cap.src, mask, false);
  const st = { rot:0, om:0, charge:0, captured:false, last:0, dragging:false, prevA:0, prevT:0 };
  cancelAnimationFrame(cap.spinRAF);

  // rotate around the subject's own centre, not the canvas centre
  const center = ()=>{ const r = cv.getBoundingClientRect();
    return [r.left + cx/cv.width*r.width, r.top + cy/cv.height*r.height]; };
  const angOf = ev=>{ const [px,py]=center(); return Math.atan2(ev.clientY-py, ev.clientX-px); };
  cv.onpointerdown = ev=>{ ev.preventDefault(); cv.setPointerCapture(ev.pointerId);
    st.dragging=true; st.prevA=angOf(ev); st.prevT=performance.now(); ac(); };
  cv.onpointermove = ev=>{
    if(!st.dragging) return;
    ev.preventDefault();
    const a=angOf(ev), t=performance.now();
    let d=a-st.prevA; while(d>Math.PI)d-=TAU; while(d<-Math.PI)d+=TAU;
    const dt=Math.max(8,t-st.prevT)/1000;
    st.om = st.om*.5 + (d/dt)*.5;
    st.rot += d;
    st.prevA=a; st.prevT=t;
  };
  cv.onpointerup = cv.onpointercancel = ()=>{ st.dragging=false; };

  st.last = performance.now();
  const NEED = 2.2; // seconds above threshold
  const THRESH = 9;  // rad/s
  function frame(now){
    const dt = Math.min(.05,(now-st.last)/1000); st.last=now;
    if(!st.dragging){ st.om *= (1-1.1*dt); st.rot += st.om*dt; }
    const fast = Math.abs(st.om) > THRESH;
    if(!st.captured){
      st.charge = clamp(st.charge + (fast? dt : -dt*1.5), 0, NEED);
      $('#spin-fill').style.width = (st.charge/NEED*100)+'%';
      if(st.charge>=NEED){ st.captured=true; sfx('win'); setTimeout(capSuccess, 700); }
    }
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.drawImage(base,0,0);
    // the cut subject spins in place, as if peeled off the photo
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(st.rot); ctx.translate(-cx,-cy);
    ctx.drawImage(cut, 0, 0, w*2, h*2);
    ctx.restore();
    // dashed outline circling the subject
    ctx.save();
    ctx.setLineDash([9,7]); ctx.lineDashOffset = -st.rot*20;
    ctx.strokeStyle='rgba(201,111,78,.9)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(cx,cy,R+8,0,TAU); ctx.stroke();
    ctx.restore();
    // charge ring
    ctx.beginPath(); ctx.arc(cx,cy,R+20,-Math.PI/2,-Math.PI/2+TAU*(st.charge/NEED));
    ctx.strokeStyle = st.captured? '#d9a53f' : '#c96f4e'; ctx.lineWidth=8; ctx.lineCap='round'; ctx.stroke();
    cap.spinRAF = requestAnimationFrame(frame);
  }
  cap.spinRAF = requestAnimationFrame(frame);
}

    headers:{ 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':blob.type },
    body: blob
  });
  if(r.ok || r.status===409) return true; // 409 = 同一顆陀螺已上傳過,視同成功
  const tx = await r.text().catch(()=> '');
  throw new Error('Storage '+r.status+(tx?': '+tx.slice(0,120):''));
}
/* 陀螺圖上傳:dataURL -> WebP(不支援則 PNG)-> Supabase Storage 公開網址
   任一步失敗就退回原本的 base64 內嵌,發佈不會因此失敗 */
const WEBP_OK = (()=>{ try{ const c=document.createElement('canvas'); c.width=c.height=2;
  return c.toDataURL('image/webp').indexOf('data:image/webp')===0; }catch(e){ return false; } })();
function encodeBladeImg(dataUrl){
  return new Promise((res,rej)=>{
    const im=new Image();
    im.onload=()=>{
      const c=document.createElement('canvas'); c.width=im.width; c.height=im.height;
      c.getContext('2d').drawImage(im,0,0);
      const type = WEBP_OK ? 'image/webp' : 'image/png';
      c.toBlob(b=> b?res({blob:b, ext:(WEBP_OK?'webp':'png')}):rej(new Error('編碼失敗')), type, 0.85);
    };
    im.onerror=()=>rej(new Error('圖片載入失敗'));
    im.src=dataUrl;
  });
}
async function arUploadBladeImgs(blades, teamId){
  const out=[];
  for(const b of blades){
    const s=slimBlade(b);
    if(ST.mode==='shared' && /^data:/.test(s.img||'')){
      try{
        const {blob, ext} = await encodeBladeImg(s.img);
        const path = encodeURIComponent(teamId) + '/' + encodeURIComponent(b.id) + '.' + ext;
        await sbUpload(path, blob);
        s.img = SB_URL + '/storage/v1/object/public/blades/' + path;
      }catch(e){ console.warn('圖片上傳失敗,改用內嵌:', e); }
    }
    out.push(s);
  }
  return out;
}
/* storage layer with graceful degradation:
   mode 'shared'   = Supabase,真正的跨玩家競技場
   mode 'personal' = localStorage 本機備援(仍可跑完整流程)
   mode 'none'     = 儲存不可用 */
const ST = { mode:null, sharedErr:'', personalErr:'' };
async function stInit(){
  if(ST.mode!==null) return ST.mode;
  if(sbReady()){
    try{ await sbFetch('?select=id&limit=1'); ST.mode='shared'; return ST.mode; }
    catch(e){ ST.sharedErr=(e&&e.message)||String(e); }
  } else { ST.sharedErr='尚未設定 Supabase 連線資訊'; }
  try{
    const k='arena-probe'; localStorage.setItem(k,'1');
    if(localStorage.getItem(k)!=='1') throw new Error('讀回的資料為空');
    localStorage.removeItem(k);
    ST.mode='personal'; return ST.mode;
  }catch(e){ ST.personalErr=(e&&e.message)||String(e); }
  ST.mode='none';
  return ST.mode;
}
function keyToId(k){ return k.startsWith(AR_TEAM) ? k.slice(AR_TEAM.length) : k; }
async function stGet(k){
  try{
    if(ST.mode==='shared'){
      const rows = await sbFetch('?id=eq.'+encodeURIComponent(keyToId(k))+'&select=data');
      return rows && rows[0] ? rows[0].data : null;
    }
    const raw = localStorage.getItem(k); return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
async function stSet(k,v){
  try{
    if(ST.mode==='none'||ST.mode===null) throw new Error(ST.sharedErr||'儲存不可用');
    if(ST.mode==='shared'){
      const row = { id:keyToId(k), name:(v&&v.name)||'', w:(v&&v.w)||0, l:(v&&v.l)||0,
        data:v, updated_at:new Date().toISOString() };
      await sbFetch('', { method:'POST',
        headers:{ 'Prefer':'resolution=merge-duplicates' }, body:JSON.stringify(row) });
    } else {
      localStorage.setItem(k, JSON.stringify(v));
    }
    stLastErr='';
    return true;
  }catch(e){ stLastErr=(e&&e.message)||String(e); console.error('storage.set failed:',k,e); return false; }
}
async function stDel(k){
  try{
    if(ST.mode==='shared') await sbFetch('?id=eq.'+encodeURIComponent(keyToId(k)), {method:'DELETE'});
    else localStorage.removeItem(k);
  }catch(e){}
}

function timeAgo(t){ const d=(Date.now()-t)/1000;
  if(d<3600) return Math.max(1,Math.round(d/60))+'分鐘前';
  if(d<86400) return Math.round(d/3600)+'小時前';
  return Math.round(d/86400)+'天前'; }

function buildStarterBlades(){
  return Promise.all(STARTERS.map(st=>new Promise(res=>{
    const im=new Image();
    im.onload=()=>{ const c=document.createElement('canvas'); c.width=c.height=300;
      const x=c.getContext('2d'); const sc=Math.min(300/im.width,300/im.height);
      x.drawImage(im,(300-im.width*sc)/2,(300-im.height*sc)/2,im.width*sc,im.height*sc);
      res(forgeBlade(c,{useAlpha:true,innate:st.innate,name:st.name,spinDir:st.spinDir})); };
    im.onerror=()=>res(null);
    im.src=STARTER_IMGS[st.key];
  }))).then(l=>l.filter(Boolean));
}

async function arLoadIndex(q){
  if(ST.mode==='shared'){
    let qs='?select=id,name,w,l,updated_at&id=neq.'+encodeURIComponent(myArenaId())
      +'&order=updated_at.desc&limit=50';
    if(q) qs+='&name=ilike.'+encodeURIComponent('*'+q+'*');
    try{
      const rows=await sbFetch(qs);
      return rows.map(r=>[r.id,{n:r.name,w:r.w||0,l:r.l||0,at:Date.parse(r.updated_at)||Date.now()}]);
    }catch(e){ stLastErr=(e&&e.message)||String(e); return []; }
  }
  let out=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k||!k.startsWith(AR_TEAM)) continue;
    const id=k.slice(AR_TEAM.length);
    if(id===myArenaId()) continue;
    try{ const t=JSON.parse(localStorage.getItem(k));
      out.push([id,{n:t.name||'',w:t.w||0,l:t.l||0,at:t.at||Date.now()}]); }catch(e){}
  }
  if(q) out=out.filter(([id,m])=>(m.n||'').includes(q));
  return out.sort((a,b)=>(b[1].at||0)-(a[1].at||0));
}

/* ============ ENEMY GENERATION ============ */
const ENEMY_PRE = ['鋼','影','雷','焰','風','毒','冥','蒼','緋','金'];
const ENEMY_SUF = ['牙','爪','輪','刃','衛','星','虎','龍','隼','蠍'];
function enemyShapeCanvas(){
  const c = document.createElement('canvas'); c.width=c.height=256;
  const ctx = c.getContext('2d');
  const kind = irand(0,3);
  const hue1 = irand(0,359), hue2 = (hue1+irand(60,180))%360;
  const grad = ctx.createRadialGradient(128,128,10,128,128,120);
  grad.addColorStop(0,`hsl(${hue1} 85% 62%)`);
  grad.addColorStop(1,`hsl(${hue2} 80% 38%)`);
  ctx.fillStyle = grad;
  ctx.translate(128,128);
  ctx.beginPath();
  if(kind===0){ // spiky star
    const n = irand(5,9), inn = rand(.45,.7);
    for(let i=0;i<n*2;i++){ const a=i/(n*2)*TAU, r=118*(i%2?inn:1)*rand(.92,1);
      ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); }
  } else if(kind===1){ // gear
    const n = irand(8,14), inn = rand(.72,.85);
    for(let i=0;i<n*4;i++){ const a=i/(n*4)*TAU, r=118*((i%4<2)?1:inn);
      ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); }
  } else if(kind===2){ // smooth blob
    const pts=[]; const n=10;
    for(let i=0;i<n;i++) pts.push(rand(.62,1));
    for(let i=0;i<=n;i++){
      const a=i/n*TAU, r=118*pts[i%n];
      const a2=(i+.5)/n*TAU, r2=118*(pts[i%n]+pts[(i+1)%n])/2;
      if(i===0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
      else ctx.quadraticCurveTo(Math.cos(a2-Math.PI/n)*r2, Math.sin(a2-Math.PI/n)*r2, Math.cos(a)*r, Math.sin(a)*r);
    }
  } else { // saw disc
    const n = irand(3,6);
    for(let i=0;i<n;i++){ const a0=i/n*TAU, a1=(i+1)/n*TAU;
      ctx.lineTo(Math.cos(a0)*118, Math.sin(a0)*118);
      ctx.arc(0,0,80, a0+.18, a1, false); }
  }
  ctx.closePath(); ctx.fill();
  // hub
  ctx.beginPath(); ctx.arc(0,0,34,0,TAU);
  ctx.fillStyle = `hsl(${hue2} 40% 18%)`; ctx.fill();
  ctx.beginPath(); ctx.arc(0,0,16,0,TAU);
  ctx.fillStyle = `hsl(${hue1} 90% 70%)`; ctx.fill();
  return c;
}
function makeEnemy(level){ // level ≈ target average innate 0-100
  for(let tries=0; tries<8; tries++){
    const inn = ()=>clamp(Math.round(level + rand(-18,18)), 8, 100);
    const b = forgeBlade(enemyShapeCanvas(), {useAlpha:true,
      innate:{power:inn(), weight:inn(), tough:inn()}, isEnemy:true});
    if(b){
      b.name = ENEMY_PRE[irand(0,9)] + ENEMY_SUF[irand(0,9)];
      return b;
    }
  }
  return null;
}
function makeEnemyTeam(playerTeam){
  const avg = playerTeam.reduce((s,b)=>s+(b.innate.power+b.innate.weight+b.innate.tough)/3,0)/playerTeam.length;
  return playerTeam.map(()=>makeEnemy(avg*rand(.85,1.1)));
}
/* ============ BATTLE ENGINE (BEYBLADE X rules) ============ */
const ARENA = {
  W:440, H:560, cx:220, cy:285, R:170,
  pockets:[ {a:Math.PI*0.80, w:.5}, {a:Math.PI*0.20, w:.5} ], // 擊飛區域: symmetric bottom-left & bottom-right
  xzone:{a:Math.PI*0.5, w:.5},                                 // 極限區域: dead centre bottom
  // two symmetric cat-ear bulges, part of one continuous rim contour;
  // the edge accel band sweeps a blade up into its matching ear,
  // then the ear curve slings it down through the centre
  ears:[ {a:-Math.PI/2-0.62, s:.20, h:40, dir:1}, {a:-Math.PI/2+0.62, s:.20, h:40, dir:-1} ],
  rail:{r0:.80, r1:1.0}
};
function earBump(ang){ // smooth rim bulge (px) at this angle - one unified contour
  let h=0;
  for(const ear of ARENA.ears){
    let d=ang-ear.a; while(d>Math.PI)d-=TAU; while(d<-Math.PI)d+=TAU;
    h += ear.h*Math.exp(-(d*d)/(2*ear.s*ear.s));
  }
  return h;
}
const FINISH_PTS = { spin:1, over:2, burst:2, xtreme:3 };
const FINISH_TXT = {
  spin:['SPIN FINISH!','旋轉勝利 +1'], over:['OVER FINISH!','擊飛勝利 +2'],
  burst:['BURST FINISH!','爆裂勝利 +2'], xtreme:['XTREME FINISH!','極限勝利 +3'],
  draw:['DRAW','同時停止,雙方不得分']
};
let match = null;
let bat = null;
let batRAF = 0;

function angIn(ang, center, w){
  let d=ang-center; while(d>Math.PI)d-=TAU; while(d<-Math.PI)d+=TAU;
  return Math.abs(d)<w/2;
}
function inPocket(ang){ return ARENA.pockets.some(p=>angIn(ang,p.a,p.w)); }
function inXAng(ang){ return angIn(ang, ARENA.xzone.a, ARENA.xzone.w); }

function makeFighter(blade, side){
  const bc = document.createElement('canvas'); bc.width=bc.height=256;
  const bctx = bc.getContext('2d');
  bctx.drawImage(bladeImage(blade),0,0);
  // average colour for fragments
  const d = bctx.getImageData(0,0,256,256).data;
  let r=0,g=0,b=0,n=0;
  for(let i=0;i<256*256;i+=17){ if(d[i*4+3]>60){ r+=d[i*4];g+=d[i*4+1];b+=d[i*4+2];n++; } }
  n=n||1;
  const st = blade.stats;
  // size normalisation: scale physical radius so RMS body radius is balanced across shapes
  const prof = Float32Array.from(blade.prof);
  let ms=0; for(let i=0;i<PROF_N;i++) ms+=prof[i]*prof[i];
  const rms=Math.sqrt(ms/PROF_N);
  const sizeNorm=clamp(.86/rms, .9, 1.6);
  const spinDir = blade.spinDir || 'R';
  const rpm0 = 1750 + st.power*4.5 + rand(0,200);
  return {
    blade, side, bc, bctx, spinDir,
    color:`rgb(${(r/n)|0},${(g/n)|0},${(b/n)|0})`,
    profNow: prof, profOrig: Float32Array.from(blade.prof),
    stress: new Float32Array(PROF_N),
    rad: clamp((32 + st.weight*0.02)*sizeNorm, 30, 42),
    mass: (0.6 + blade.metrics.areaFrac) * (0.7 + st.weight/100*0.9),
    x:0,y:0,vx:0,vy:0,rot:rand(0,TAU),
    rpm: rpm0, rpm0: rpm0, rpmMax: rpm0 + 220,
    integrity:100, stopped:false, gone:false, flying:false,
    lastHitAt:-9, lastHitDash:false, lastHitBy:null, lastHitPow:0,
    // right-spin orbits counter-clockwise, left-spin clockwise
    dir: spinDir==='R' ? -1 : 1,
    spinSign: spinDir==='R' ? 1 : -1,
    orbitR:0, ellW:rand(1.1,2.1), ellP:rand(0,TAU),
    dashCD:0, dashT:0, trail:[]
  };
}
function effRad(f, worldAng){
  let li = Math.round((worldAng - f.rot)/TAU*PROF_N) % PROF_N; if(li<0) li+=PROF_N;
  return f.rad * (0.5 + 0.5*f.profNow[li]);
}
function localSpike(f, worldAng){ // how jagged the contour is at contact
  let li = Math.round((worldAng - f.rot)/TAU*PROF_N) % PROF_N; if(li<0) li+=PROF_N;
  const a=f.profNow[(li+PROF_N-2)%PROF_N], b=f.profNow[li], c=f.profNow[(li+2)%PROF_N];
  return clamp(Math.abs(a-b)+Math.abs(c-b), 0, .8)*2.2;
}
/* --- structural fracture mechanics ---
   Impacts accumulate stress around the contact arc. When local stress exceeds the
   material threshold (toughness), a whole structural chunk shears off along a
   fracture line - protruding features concentrate stress and break first. */
function integrityOf(f){
  let s=0,s0=0;
  for(let i=0;i<PROF_N;i++){ s+=f.profNow[i]*f.profNow[i]; s0+=f.profOrig[i]*f.profOrig[i]; }
  return 100*s/s0;
}
function protrusion(f,i){ // how much this spoke sticks out vs its shoulders
  const p=f.profNow;
  const nb=(p[(i+7)%PROF_N]+p[(i+PROF_N-7)%PROF_N])/2;
  return clamp((p[i]-nb)*3, 0, 1.6);
}
function applyStress(f, worldAng, dmg){
  let li = Math.round((worldAng - f.rot)/TAU*PROF_N) % PROF_N; if(li<0) li+=PROF_N;
  for(let k=-7;k<=7;k++){
    const i=(li+k+PROF_N)%PROF_N;
    f.stress[i] += dmg*2.6*Math.exp(-k*k/12);
  }
}
function polyPath(ctx,pts){
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();
}
function tryFracture(f){
  const TH = 9 + f.blade.stats.tough*0.16;
  let bi=-1, bs=0;
  for(let i=0;i<PROF_N;i++){
    const s=f.stress[i]*(0.7+protrusion(f,i));
    if(s>bs){bs=s;bi=i;}
  }
  if(bs<TH) return false;
  // grow the fracture region along the over-stressed arc
  const hot=i=>f.stress[i]*(0.7+protrusion(f,i)) > TH*0.3;
  let lo=bi, hi=bi;
  for(let k=1;k<22;k++){ const i=(bi-k+PROF_N)%PROF_N; if(!hot(i))break; lo=i; }
  for(let k=1;k<22;k++){ const i=(bi+k)%PROF_N; if(!hot(i))break; hi=i; }
  let span=(hi-lo+PROF_N)%PROF_N;
  // slab fracture: enforce a wide arc so pieces are chunky blocks,
  // never needle-thin slivers
  const MINSPAN = 12; // ~45 degrees
  if(span<MINSPAN){ lo=(lo-Math.ceil((MINSPAN-span)/2)+PROF_N)%PROF_N; span=MINSPAN; }
  // inner crack line = a few straight facets (split-slate look),
  // plateaued depth with a fast ramp at both ends, only tiny roughness
  const depthAmp = rand(.42,.68);
  const nCtl = irand(3,5);
  const ctl = []; for(let c=0;c<nCtl;c++) ctl.push(depthAmp*rand(.75,1.15));
  const newRs=[];
  for(let k=0;k<=span;k++){
    const i=(lo+k)%PROF_N, t=k/span;
    const ct=t*(nCtl-1), c0=Math.min(nCtl-2, Math.floor(ct)), ft=ct-c0;
    const facet = ctl[c0]*(1-ft) + ctl[c0+1]*ft;
    const taper = clamp(Math.min(t,1-t)/0.16, 0, 1);
    const deep = Math.max(0, facet*taper + rand(-.045,.045));
    newRs.push(Math.max(.2, f.profNow[i]*(1-deep)));
  }
  const pts=[];
  for(let k=0;k<=span;k++){ const i=(lo+k)%PROF_N, aa=i/PROF_N*TAU;
    pts.push([128+Math.cos(aa)*(120*f.profNow[i]+9), 128+Math.sin(aa)*(120*f.profNow[i]+9)]); }
  for(let k=span;k>=0;k--){ const i=(lo+k)%PROF_N, aa=i/PROF_N*TAU;
    pts.push([128+Math.cos(aa)*120*newRs[k], 128+Math.sin(aa)*120*newRs[k]]); }
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  pts.forEach(([x,y])=>{ x0=Math.min(x0,x);y0=Math.min(y0,y);x1=Math.max(x1,x);y1=Math.max(y1,y); });
  x0=clamp(x0-2,0,256); y0=clamp(y0-2,0,256); x1=clamp(x1+2,0,256); y1=clamp(y1+2,0,256);
  // the broken piece keeps its real appearance
  const fc=document.createElement('canvas'); fc.width=fc.height=256;
  const fx=fc.getContext('2d');
  fx.beginPath(); polyPath(fx,pts); fx.clip(); fx.drawImage(f.bc,0,0);
  // carve it off the blade
  f.bctx.save();
  f.bctx.globalCompositeOperation='destination-out';
  f.bctx.beginPath(); polyPath(f.bctx,pts); f.bctx.fill();
  f.bctx.restore();
  for(let k=0;k<=span;k++){ const i=(lo+k)%PROF_N;
    f.profNow[i]=Math.min(f.profNow[i], newRs[k]); f.stress[i]=0; }
  f.integrity = integrityOf(f);
  const midA=((lo+span/2)/PROF_N)*TAU + f.rot;
  const fscale=f.rad/120;
  bat.frags.push({img:fc, bx:x0,by:y0,bw:x1-x0,bh:y1-y0, scale:fscale,
    cr:Math.max(x1-x0,y1-y0)*fscale*.35,
    x:f.x+Math.cos(midA)*f.rad*.85, y:f.y+Math.sin(midA)*f.rad*.85,
    vx:Math.cos(midA)*rand(240,430)+f.vx*.45, vy:Math.sin(midA)*rand(240,430)+f.vy*.45,
    rot:f.rot, vr:rand(-11,11), life:rand(1.4,2)});
  bat.shake=Math.max(bat.shake,.6);
  sfx('burst');
  return true;
}
function spawnFragments(x,y,ang,n,color,pow){
  for(let i=0;i<n;i++){
    const a = ang + rand(-1.1,1.1), sp = rand(60,180)*pow;
    bat.frags.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      rot:rand(0,TAU), vr:rand(-9,9), size:rand(3,8+pow*3), life:rand(.5,1.1), color});
  }
}

/* ---- match flow ---- */
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){ const j=irand(0,i); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}
function startMatch(mode, team1, team2){

            pOrder:[0,1,2], eOrder:[0,1,2] };

function reorderModal(team, label, cb){

  openModal(`<h3>${label}:重排出場順序</h3>
    <p class="hint small" style="margin:0;">三戰未分勝負!依序點選第 1、2、3 棒</p>
    <div class="pick-grid">`+
    team.map((b,i)=>`<div class="card" data-i="${i}"><img src="${b.img}"><div class="nm">${escapeHtml(b.name)}</div></div>`).join('')+
