function nextBattle(){
  if(!match) return;
  const {mode, pTeam, eTeam, battleNo} = match;
  if(mode==='single') return beginBattle(pTeam[0], eTeam[0]);
  if(battleNo>0 && battleNo%3===0){
    // 3 battles done, still no winner: re-arrange lineups.
    // In arena mode only the player reorders; the remote opponent's
    // lineup stays exactly as published.
    const go = ()=> beginBattle(pTeam[match.pOrder[match.battleNo%3]], eTeam[match.eOrder[match.battleNo%3]]);
    reorderModal(pTeam, match.arena ? '我的隊伍' : '隊伍一', ord1=>{
      match.pOrder = ord1;
      if(match.arena){ go(); return; }
      reorderModal(eTeam, '隊伍二', ord2=>{ match.eOrder = ord2; go(); });
    });
    return;
  }
  beginBattle(pTeam[match.pOrder[battleNo%3]], eTeam[match.eOrder[battleNo%3]]);
}
function beginBattle(pb, ebl){
  cancelAnimationFrame(batRAF);
  bat = {
    p: makeFighter(pb,'p'), e: makeFighter(ebl,'e'),
    frags:[], phase:'intro', t:0, count:3, time:0, shake:0,
    finish:null, lastSfx:0
  };
  // random launch positions / angles (自動物理演算,無人為操控)
  [bat.p,bat.e].forEach((f,i)=>{
    const a = (i? rand(-.9,.9) : Math.PI+rand(-.9,.9));
    const rr = ARENA.R*rand(.42,.62);
    f.x = ARENA.cx+Math.cos(a)*rr; f.y = ARENA.cy+Math.sin(a)*rr;
    f.orbitR = rr;
    // shoot! launch tangentially along its own spin direction, drifting outward
    const sp = 340 + f.blade.stats.power*2 + rand(0,110);
    const tvx = -Math.sin(a)*f.dir, tvy = Math.cos(a)*f.dir;
    f.vx = tvx*sp + Math.cos(a)*sp*.3 + rand(-40,40);
    f.vy = tvy*sp + Math.sin(a)*sp*.3 + rand(-40,40);
  });
  updateHud();
  $('#hud-round').textContent = '第 '+(match.battleNo+1)+' 戰';
  let last = performance.now();
  const loop = now=>{
    const dt = Math.min(1/30,(now-last)/1000); last = now;
    stepBattle(dt); renderBattle();
    batRAF = requestAnimationFrame(loop);
  };
  batRAF = requestAnimationFrame(loop);
}
function updateHud(){
  [['#hud-p',bat.p],['#hud-e',bat.e]].forEach(([q,f])=>{
    const el=$(q);
    el.querySelector('.hn').textContent =
      f.blade.name + (f.spinDir==='L'?' ↺':' ↻') + (f.gone?'(出局)':f.stopped?'(停)':'');
    el.querySelector('.meter.spin i').style.width = clamp(f.rpm/f.rpm0*100,0,100)+'%';
    el.querySelector('.meter.integ i').style.width = clamp(f.integrity,0,100)+'%';
  });
  $('#hud-score').textContent = match.scoreP+' - '+match.scoreE;
}
function showMsg(main, sub, ms){
  const m=$('#battle-msg');
  m.innerHTML = main + (sub?`<span class="sub">${sub}</span>`:'');
  m.classList.add('show');
  if(ms) setTimeout(()=>m.classList.remove('show'), ms);
}

/* ---- simulation step ---- */
function stepBattle(dt){
  bat.t += dt;
  if(bat.phase==='intro'){
    if(bat.t>1.3){ bat.phase='count'; bat.t=0; bat.count=4; }
    return;
  }
  if(bat.phase==='count'){
    const c = 3-Math.floor(bat.t);
    if(c!==bat.count){ bat.count=c;
      if(c>0){ showMsg(c,'',350); sfx('count'); }
      else { showMsg('GO SHOOT!','',700); sfx('launch'); bat.phase='run'; bat.time=0; }
    }
    return;
  }
  if(bat.phase!=='run') { stepFrags(dt); stepFlyers(dt); return; }
  bat.time += dt;
  bat.shake = Math.max(0, bat.shake-dt*4);
  const F=[bat.p,bat.e];
  for(const f of F){
    if(f.gone) continue;
    const opp = f===bat.p ? bat.e : bat.p;
    const rx=f.x-ARENA.cx, ry=f.y-ARENA.cy, dc=Math.hypot(rx,ry)||1;
    const ux=rx/dc, uy=ry/dc;
    if(!f.stopped){
      // stress relaxation
      const relax=Math.exp(-0.3*dt);
      for(let i=0;i<PROF_N;i++) f.stress[i]*=relax;
      if(f.dashT>0){
        f.dashT -= dt;
        const sp=Math.hypot(f.vx,f.vy)||1;
        f.vx += f.vx/sp*420*dt; f.vy += f.vy/sp*420*dt;
      } else {
        // true bowl physics: the curved floor acts as a central spring (F = -k·r),
        // so each top traces precessing ellipse loops that sweep right through
        // the middle - natural head-on collisions instead of rim circling.
        const spinFrac = clamp(f.rpm / f.rpm0, 0, 1);
        // fresh off the launcher a top has the energy to hold the outer wall,
        // so the slope barely grips it (rim-riding phase = X-Dash window);
        // once spin drops, the bowl pulls it into shrinking centre ellipses
        const railPhase = clamp((spinFrac-.78)/.22, 0, 1);
        const k = (7 + 9*(1-spinFrac)) * (1 - .85*railPhase);
        f.vx += -rx*k*dt; f.vy += -ry*k*dt;
        // launch-phase centrifugal drift keeps it out on the wall
        f.vx += ux*240*railPhase*dt; f.vy += uy*240*railPhase*dt;
        // gentle gyroscopic precession keeps it circulating in its spin direction
        const tx=-uy*f.dir, ty=ux*f.dir;
        const vt=f.vx*tx+f.vy*ty;
        const vtT = 90 + 260*spinFrac;
        f.vx += tx*(vtT-vt)*.55*dt; f.vy += ty*(vtT-vt)*.55*dt;
        // rolling friction shrinks the loops until it settles in the middle
        const damp = .10 + 1.5*Math.pow(1-spinFrac,1.6);
        f.vx *= Math.exp(-damp*dt); f.vy *= Math.exp(-damp*dt);
        // edge accel band: only reachable while launch speed is still high;
        // sweeping up into the matching cat-ear curve slings the top
        // down through the centre at the opponent (X-Dash)
        f.dashCD = Math.max(0, f.dashCD-dt);
        if(dc > ARENA.R*.76 && f.rpm>250 && spinFrac>0.5){
          // the band grips the top: holds it on the outer lane and carries it
          // around to the cat ear, where the curve slings it into the bowl
          const myAng = Math.atan2(ry,rx);
          const bandR = ARENA.R*.9 + earBump(myAng)*.45;
          f.vx += ux*(bandR-dc)*16*dt; f.vy += uy*(bandR-dc)*16*dt;
          f.vx += tx*300*dt; f.vy += ty*300*dt;
          if(f.dashCD<=0 && vt>190 && earBump(myAng)>8){
            const ear = ARENA.ears[myAng < -Math.PI/2 ? 0 : 1];
            if(ear.dir===f.dir){
              f.dashT=.8; f.dashCD=2.2;
              const tgx=ARENA.cx*.45+opp.x*.55, tgy=ARENA.cy*.45+opp.y*.55;
              const da=Math.atan2(tgy-f.y, tgx-f.x);
              const dsp=520 + f.blade.stats.power*2.2 + vt*.3;
              f.vx=Math.cos(da)*dsp; f.vy=Math.sin(da)*dsp;
              sfx('launch');
            }
          }
        }
      }
      if(f.dashT>0){ f.vx *= Math.exp(-.15*dt); f.vy *= Math.exp(-.15*dt); }
      f.rpm -= dt*110*(1.8 - f.blade.stats.stamina/100*1.25);
      f.rot += f.spinSign*clamp(f.rpm,0,1600)/60*TAU*dt*.3;
      if(f.rpm<100 && !f.stopped){ f.stopped=true; }
    } else {
      f.vx *= Math.exp(-6*dt); f.vy *= Math.exp(-6*dt);
      f.rot += Math.sin(bat.time*10)*dt; // dying wobble
    }
    f.x += f.vx*dt; f.y += f.vy*dt;
    // rim wall - pockets & Xtreme bay sit behind raised lips:
    // only a real knock (recent hit, enough outward force) carries a blade over
    const dx2=f.x-ARENA.cx, dy2=f.y-ARENA.cy, d2=Math.hypot(dx2,dy2), ang=Math.atan2(dy2,dx2);
    const wallR = ARENA.R + earBump(ang)*0.7 - f.rad*.5; // wall follows the ear contour
    if(d2>wallR){
      const nx=dx2/d2, ny=dy2/d2;
      const vOut = f.vx*nx+f.vy*ny;
      const knocked = bat.time-f.lastHitAt<.8;
      // exit zone is decided purely by WHERE the blade leaves the stadium:
      // Xtreme bay (with a small margin) always scores +3, pockets score +2
      const exitX = angIn(ang, ARENA.xzone.a, ARENA.xzone.w*1.15);
      const exitP = !exitX && inPocket(ang);
      const carried = (knocked && vOut>260 && f.lastHitPow>460) || vOut>430;
      if(bat.time>2 && (exitX||exitP) && carried){
        f.gone=true; f.flying=true; f.vx*=1.25; f.vy*=1.25;
        const winner = (f.lastHitBy && !f.lastHitBy.gone && f.lastHitBy.side!==f.side)
                     ? f.lastHitBy : (f.side==='p'?bat.e:bat.p);
        return endRound(exitX?'xtreme':'over', winner, f);
      }
      if(vOut>0){ f.vx-=nx*vOut*1.55; f.vy-=ny*vOut*1.55; }
      f.x = ARENA.cx+nx*wallR; f.y = ARENA.cy+ny*wallR;
      f.dashT = Math.min(f.dashT, .1);
      f.orbitR = Math.min(f.orbitR, ARENA.R*.8);
    }
    f.trail.push([f.x,f.y, f.dashT>0?1:0]); if(f.trail.length>14) f.trail.shift();
  }
  // collision
  const a=bat.p, b=bat.e;
  if(!a.gone && !b.gone){
    const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy)||1, ang=Math.atan2(dy,dx);
    const Ra=effRad(a,ang), Rb=effRad(b,ang+Math.PI);
    if(d < Ra+Rb){
      const nx=dx/d, ny=dy/d;
      const overlap=Ra+Rb-d;
      a.x-=nx*overlap/2; a.y-=ny*overlap/2; b.x+=nx*overlap/2; b.y+=ny*overlap/2;
      const rvx=a.vx-b.vx, rvy=a.vy-b.vy, vn=rvx*nx+rvy*ny;
      if(vn>0){
        // bounce energy fades with spin: fresh tops blast apart,
        // dying tops just clunk together on a floor full of friction
        const sfAvg=(clamp(a.rpm/a.rpm0,0,1)+clamp(b.rpm/b.rpm0,0,1))/2;
        const e=0.55 + 1.05*sfAvg, j=(1+e)*vn/(1/a.mass+1/b.mass);
        a.vx-=j*nx/a.mass; a.vy-=j*ny/a.mass;
        b.vx+=j*nx/b.mass; b.vy+=j*ny/b.mass;
        // spin grinding flick
        const tx=-ny, ty=nx, grind=(a.rpm-b.rpm)*0.09*(.3+.7*sfAvg);
        a.vx+=tx*grind/a.mass; a.vy+=ty*grind/a.mass;
        b.vx-=tx*grind/b.mass; b.vy-=ty*grind/b.mass;
        const impact = vn + Math.abs(a.rpm+b.rpm)*0.05;
        const hit=(atk,def,spike,dashBonus)=>{
          // destructive power also fades with spin - late-game nudges just clunk
          return clamp(impact/420 * (0.35+atk.stats.attack/100*1.1) * (0.75+spike) * dashBonus
                 * 8.5 * clamp(sfAvg*2, .3, 1)
                 / (0.55 + def.stats.defense/100*0.95 + def.stats.tough/100*0.65), 0.2, 30);
        };
        const dmgB = hit(a.blade, b.blade, localSpike(a,ang), a.dashT>0?1.8:1);
        const dmgA = hit(b.blade, a.blade, localSpike(b,ang+Math.PI), b.dashT>0?1.8:1);
        applyStress(b, ang+Math.PI, dmgB); applyStress(a, ang, dmgA);
        const mx=a.x+nx*Ra, my=a.y+ny*Ra;
        spawnFragments(mx,my,ang, Math.round(dmgB*.5)+1, b.color, clamp(dmgB/9,.4,1.4));
        spawnFragments(mx,my,ang+Math.PI, Math.round(dmgA*.5)+1, a.color, clamp(dmgA/9,.4,1.4));
        // spin loss on clash
        if(!a.stopped) a.rpm -= impact*(0.03+dmgA*0.004)/(0.5+a.blade.stats.weight/100);
        if(!b.stopped) b.rpm -= impact*(0.03+dmgB*0.004)/(0.5+b.blade.stats.weight/100);
        // opposite-spin contact: spin force transfers between the two -
        // the steadier blade absorbs and recovers RPM (when not blasted away)
        if(a.spinDir!==b.spinDir && vn<380){
          const steadiness = f=>f.blade.stats.stamina*.7 + (f.blade.metrics.sym||0)*30 + f.blade.stats.defense*.2 + rand(-6,6);
          const w = steadiness(a)>=steadiness(b) ? a : b, l = w===a ? b : a;
          const xfer = impact*.055*rand(.7,1.2);
          w.rpm = Math.min(w.rpm + xfer*1.15, w.rpmMax);
          l.rpm = Math.max(60, l.rpm - xfer);
        }
        b.lastHitAt=bat.time; b.lastHitDash=a.dashT>0; b.lastHitBy=a;
        a.lastHitAt=bat.time; a.lastHitDash=b.dashT>0; a.lastHitBy=b;
        b.lastHitPow = impact*(0.6 + a.blade.stats.attack/150);
        a.lastHitPow = impact*(0.6 + b.blade.stats.attack/150);
        // knocked apart: each resumes orbiting from wherever it bounced to
        a.orbitR = Math.hypot(a.x-ARENA.cx, a.y-ARENA.cy);
        b.orbitR = Math.hypot(b.x-ARENA.cx, b.y-ARENA.cy);
        a.dashT = Math.min(a.dashT,.12); b.dashT = Math.min(b.dashT,.12);
        bat.shake = clamp(Math.max(dmgA,dmgB)*0.07,.15,1);
        if(bat.time-bat.lastSfx>.06){ sfx('hit'); bat.lastSfx=bat.time; }
        // structural fracture & burst check (integrity below 50%)
        tryFracture(b); tryFracture(a);
        if(b.integrity<=50){ burstOut(b); return endRound('burst', a, b); }
        if(a.integrity<=50){ burstOut(a); return endRound('burst', b, a); }
      }
    }
  }
  stepFrags(dt);
  // spin finish
  const ps=bat.p.stopped, es=bat.e.stopped;
  if(ps&&es){
    if(Math.abs(bat.p.rpm-bat.e.rpm)<2) return endRound('draw', null, null);
    const w = bat.p.rpm>bat.e.rpm ? bat.p : bat.e;
    return endRound('spin', w, w===bat.p?bat.e:bat.p);
  }
  if(ps&&!bat.p.gone&&!bat.e.gone) return endRound('spin', bat.e, bat.p);
  if(es&&!bat.p.gone&&!bat.e.gone) return endRound('spin', bat.p, bat.e);
  if(bat.time>50){ return endRound('spin', bat.p.rpm>=bat.e.rpm?bat.p:bat.e, bat.p.rpm>=bat.e.rpm?bat.e:bat.p); }
  if((bat.time*60|0)%6===0) updateHud();
}
function burstOut(f){
  f.gone=true; sfx('burst');
  for(let k=0;k<26;k++) spawnFragments(f.x,f.y,rand(0,TAU),1,f.color,rand(.8,2));
  bat.shake=1;
}
/* knocked-out blades slide out and spin down beside the stadium */
function stepFlyers(dt){
  for(const f of [bat.p,bat.e]){
    if(!f || !f.flying) continue;
    f.x += f.vx*dt; f.y += f.vy*dt;
    f.vx *= Math.exp(-3*dt); f.vy *= Math.exp(-3*dt);
    f.rpm = Math.max(0, f.rpm - dt*650);
    f.rot += f.spinSign*clamp(f.rpm,0,1600)/60*TAU*dt*.3
           + (f.rpm<250 ? Math.sin(bat.t*9)*dt*1.5 : 0);
    f.x = clamp(f.x, f.rad*.7, ARENA.W - f.rad*.7);
    f.y = clamp(f.y, f.rad*.7, ARENA.H - f.rad*.7);
  }
}
function stepFrags(dt){
  bat.frags = bat.frags.filter(fr=>{
    fr.x+=fr.vx*dt; fr.y+=fr.vy*dt; fr.rot+=fr.vr*dt;
    if(fr.img){
      // broken pieces are physical debris
      fr.vx*=Math.exp(-1.7*dt); fr.vy*=Math.exp(-1.7*dt); fr.vr*=Math.exp(-1.2*dt);
      const dx=fr.x-ARENA.cx, dy=fr.y-ARENA.cy, d=Math.hypot(dx,dy)||1;
      const sp=Math.hypot(fr.vx,fr.vy);
      const ang=Math.atan2(dy,dx);
      if(!fr.outside && d > ARENA.R+earBump(ang)-8){
        if(sp>250 || inPocket(ang) || inXAng(ang)){
          fr.outside=true; // fast enough to clear the rim - flies out of the stadium
        } else { // bounces off the wall, stays in play
          const nx=dx/d, ny=dy/d, vn=fr.vx*nx+fr.vy*ny;
          if(vn>0){ fr.vx-=nx*vn*1.5; fr.vy-=ny*vn*1.5; }
          const rr=ARENA.R+earBump(ang)-8;
          fr.x=ARENA.cx+nx*rr; fr.y=ARENA.cy+ny*rr;
        }
      }
      if(fr.outside){
        fr.life-=dt;
        return fr.life>0 && fr.x>-40 && fr.x<ARENA.W+40 && fr.y>-40 && fr.y<ARENA.H+40;
      }
      // debris on the floor gets kicked around by the spinning tops
      for(const f of [bat.p,bat.e]){
        if(f.gone||f.stopped) continue;
        const ddx=fr.x-f.x, ddy=fr.y-f.y, dd=Math.hypot(ddx,ddy);
        const rr=f.rad*.9 + (fr.cr||6);
        if(dd<rr && dd>1){
          const nx=ddx/dd, ny=ddy/dd;
          fr.x=f.x+nx*rr; fr.y=f.y+ny*rr;
          const kick=Math.hypot(f.vx,f.vy)*.8 + f.rpm*.12 + 40;
          fr.vx = nx*kick - ny*f.spinSign*f.rpm*.09;
          fr.vy = ny*kick + nx*f.spinSign*f.rpm*.09;
          fr.vr = rand(-11,11);
          f.rpm -= 1.2; f.vx*=.985; f.vy*=.985; // grinding over debris saps a little
        }
      }
      return true; // debris persists for the rest of the round
    }
    // sparks
    fr.life-=dt;
    fr.vx*=Math.exp(-1.2*dt); fr.vy*=Math.exp(-1.2*dt);
    return fr.life>0;
  });
}
function endRound(type, winner, loser){
  if(bat.phase!=='run') return;
  bat.phase='finish';
  updateHud();
  if(type==='draw'){
    showMsg(FINISH_TXT.draw[0], FINISH_TXT.draw[1]);
  } else {
    const pts=FINISH_PTS[type];
    if(winner.side==='p') match.scoreP+=pts; else match.scoreE+=pts;
    showMsg(FINISH_TXT[type][0], escapeHtml(winner.blade.name)+' '+FINISH_TXT[type][1]);
    sfx(type==='spin'?'win':'burst');
    // record win/loss on the actual collected blades
    const wb=getBlade(winner.blade.id), lb=loser?getBlade(loser.blade.id):null;
    if(wb) wb.wins=(wb.wins||0)+1;
    if(lb) lb.losses=(lb.losses||0)+1;
    if(wb||lb) dbSave();
    updateHud();
  }
  match.battleNo++;
  const decided = match.scoreP>=4 || match.scoreE>=4;
  setTimeout(()=>{
    if(!match || !bat) return; // player quit meanwhile
    $('#battle-msg').classList.remove('show');
    roundResultModal(type, winner, decided);
  }, 1600);
}
/* score card between rounds: the scoring blade takes the stage,
   play continues only when the player taps 下一場 */
function roundResultModal(type, winner, decided){
  const b = winner ? winner.blade : null;
  openModal(`
    ${b?`<img class="sticker popin" src="${b.img}">`:''}
    <h3 style="color:var(--terra);">${type==='draw'?'DRAW':FINISH_TXT[type][0]}</h3>
    <p class="hint small" style="margin:0;">${type==='draw' ? '同時停止,雙方不得分' : escapeHtml(b.name)+'・'+FINISH_TXT[type][1]}</p>
    <div style="font-size:26px;font-weight:900;">${match.scoreP} - ${match.scoreE}</div>
    <div class="row gap"><button class="big-btn primary" id="m-next">${decided?'查看結果':'下一場'}</button></div>`);
  $('#m-next').addEventListener('click', ()=>{
    closeModal();
    if(!match) return;
    if(decided) endMatch(); else nextBattle();
  });
}
function endMatch(){
  cancelAnimationFrame(batRAF);
  const win = match.scoreP>=4;
  sfx('win');
  const team = win ? match.pTeam : match.eTeam;
  openModal(`
    <h3 style="font-size:24px;color:${win?'var(--sage)':'var(--terra)'};">${win?'隊伍一獲勝!':'隊伍二獲勝!'}</h3>
    <div class="win-stack popin">${team.map((b,i)=>
      `<img src="${b.img}" style="transform:rotate(${((i-(team.length-1)/2)*11).toFixed(0)}deg);">`).join('')}</div>
    <p class="hint small" style="margin:0;">${team.map(b=>escapeHtml(b.name)).join('・')}</p>
    <div style="font-size:30px;font-weight:900;">${match.scoreP} - ${match.scoreE}</div>
    <div class="row gap">
      <button class="big-btn" id="m-home">回主選單</button>
      <button class="big-btn primary" id="m-again">再戰一場</button>
    </div>`);
  $('#m-home').addEventListener('click', ()=>{ closeModal(); quitBattle(); });
  $('#m-again').addEventListener('click', ()=>{
    const ar = match.arena ? match.arena.opp : null;
    closeModal(); startMatch(match.mode, match.pTeam, match.eTeam);
    if(ar) match.arena = { opp:ar, reported:false, looted:false };
  });
  if(match.arena && !match.arena.reported){
    match.arena.reported = true;
    const arCtx = match.arena;
    arReport(arCtx.opp.id, win, match.scoreP+'-'+match.scoreE);
    if(win){
      const box = $('#modal-box');
      const div = document.createElement('div');
      div.style.width = '100%';
      div.innerHTML = `<p class="hint small" style="margin:8px 0 4px;"><b>戰利品!</b>選一顆對手的陀螺複製帶走</p>
        <div class="pick-grid">`+arCtx.opp.blades.map((b,i)=>
          `<div class="card" data-loot="${i}"><img src="${b.img}"><div class="nm">${escapeHtml(b.name)}</div></div>`).join('')+`</div>`;
      box.appendChild(div);
      div.querySelectorAll('[data-loot]').forEach(el=>el.addEventListener('click', ()=>{
        if(arCtx.looted) return;
        arCtx.looted = true;
        const b = arCtx.opp.blades[+el.dataset.loot];
        DB.blades.push({...slimBlade(b), id:uid(), wins:0, losses:0, createdAt:Date.now(), isEnemy:false});
        dbSave();
        el.querySelector('.nm').textContent = '已帶走!';
        div.querySelectorAll('[data-loot]').forEach(e2=>{ if(e2!==el) e2.style.opacity='.3'; });
        sfx('win');
      }));
    }
  }
}
function quitBattle(){
  cancelAnimationFrame(batRAF);
  $('#battle-exit').style.display='none';
  $('#battle-msg').classList.remove('show');
  match=null; bat=null;
  show('scr-home');
}
$('#battle-exit').addEventListener('click', quitBattle);

/* ---- rendering ---- */
function renderBattle(){
  const cv=$('#battle-canvas'), ctx=cv.getContext('2d');
  const {cx,cy,R}=ARENA;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,cv.width,cv.height);
  if(bat.shake>0) ctx.translate(rand(-1,1)*bat.shake*7, rand(-1,1)*bat.shake*7);
  // outer plate: rounded square, like the real stadium
  const plate=(ox,oy)=>{ const px=cx-R-36+ox, py=cy-R-58+oy, pw=2*R+72, ph=2*R+108, pr=46;
    ctx.beginPath();
    ctx.moveTo(px+pr,py);
    ctx.arcTo(px+pw,py,px+pw,py+ph,pr); ctx.arcTo(px+pw,py+ph,px,py+ph,pr);
    ctx.arcTo(px,py+ph,px,py,pr); ctx.arcTo(px,py,px+pw,py,pr); ctx.closePath(); };
  plate(3,5); ctx.fillStyle='rgba(75,66,55,.12)'; ctx.fill();
  plate(0,0); ctx.fillStyle='#fefcf4'; ctx.fill();
  ctx.strokeStyle='rgba(90,84,74,.35)'; ctx.lineWidth=4; ctx.stroke();
  ctx.strokeStyle='rgba(90,84,74,.8)'; ctx.lineWidth=1.6; ctx.stroke();
  // bowl floor: one continuous contour including the cat ears
  const contour=a=>R+earBump(a);
  ctx.beginPath();
  for(let a=0;a<=TAU+.02;a+=.02){
    const r=contour(a), x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r;
    a===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  const g=ctx.createRadialGradient(cx,cy,20,cx,cy,R+30);
  g.addColorStop(0,'#f5efdd'); g.addColorStop(.75,'#eee5cb'); g.addColorStop(1,'#e4d7b6');
  ctx.fillStyle=g; ctx.fill();
  // faint concentric pencil guides suggesting the bowl depth
  ctx.strokeStyle='rgba(90,84,74,.12)'; ctx.lineWidth=1.2;
  for(const rr of [.3,.55,.8]){
    ctx.beginPath(); ctx.arc(cx,cy,R*rr,0,TAU); ctx.stroke();
  }
  // rim: hand-drawn pencil stroke along the unified contour (openings at the bays)
  ctx.beginPath();
  let started=false;
  for(let a=0;a<=TAU+.01;a+=.02){
    const na=((a+Math.PI)%TAU)-Math.PI;
    if(inPocket(na)||inXAng(na)){ started=false; continue; }
    const r=contour(a), x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r;
    if(!started){ ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
  }
  ctx.strokeStyle='rgba(90,84,74,.3)'; ctx.lineWidth=6; ctx.stroke();
  ctx.strokeStyle='rgba(90,84,74,.85)'; ctx.lineWidth=2.4; ctx.stroke();
  // bottom bays: 擊飛區域 x2 (yellow) & 極限區域 (red), behind raised lips
  const bay=(a0,w0,col,lab)=>{
    ctx.beginPath();
    ctx.arc(cx,cy,R+28, a0-w0/2, a0+w0/2);
    ctx.arc(cx,cy,R-4,  a0+w0/2, a0-w0/2, true);
    ctx.closePath();
    ctx.fillStyle=col+'.30)'; ctx.fill();
    ctx.strokeStyle=col+'.65)'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,R-1, a0-w0/2, a0+w0/2);
    ctx.strokeStyle=col+'.95)'; ctx.lineWidth=4; ctx.stroke();
    ctx.save(); ctx.translate(cx+Math.cos(a0)*(R+14), cy+Math.sin(a0)*(R+14));
    ctx.rotate(a0-Math.PI/2);
    ctx.fillStyle='rgba(75,66,55,.75)'; ctx.font='700 11px Georgia,serif';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(lab,0,0);
    ctx.restore();
  };
  const xz=ARENA.xzone;
  ARENA.pockets.forEach(p=>bay(p.a, p.w, 'rgba(200,168,58,', '擊飛區域'));
  bay(xz.a, xz.w, 'rgba(191,84,66,', '極限區域');
  // centre mark: hand-drawn circle + cross
  ctx.strokeStyle='rgba(75,66,55,.28)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy,24,0,TAU); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-8,cy); ctx.lineTo(cx+8,cy);
  ctx.moveTo(cx,cy-8); ctx.lineTo(cx,cy+8); ctx.stroke();
  // trails
  for(const f of [bat.p,bat.e]){
    if(f.gone) continue;
    for(let i=1;i<f.trail.length;i++){
      const [x,y,dsh]=f.trail[i];
      ctx.beginPath(); ctx.arc(x,y, f.rad*.3*(i/f.trail.length),0,TAU);
      ctx.fillStyle = dsh? 'rgba(217,165,63,'+(i/f.trail.length*.4)+')' : 'rgba(75,66,55,'+(i/f.trail.length*.1)+')';
      ctx.fill();
    }
  }
  // fragments: real broken pieces + sparks
  for(const fr of bat.frags){
    ctx.save(); ctx.translate(fr.x,fr.y); ctx.rotate(fr.rot);
    ctx.globalAlpha=clamp(fr.life,0,1);
    if(fr.img){
      const s=fr.scale;
      ctx.drawImage(fr.img, fr.bx,fr.by,fr.bw,fr.bh,
        -fr.bw*s/2,-fr.bh*s/2, fr.bw*s, fr.bh*s);
    } else {
      ctx.fillStyle=fr.color;
      ctx.fillRect(-fr.size/2,-fr.size/2,fr.size,fr.size*.7);
    }
    ctx.restore();
  }
  ctx.globalAlpha=1;
  // blades (flying ones keep spinning down outside the stadium)
  for(const f of [bat.p,bat.e]){
    if(f.gone && !f.flying) continue;
    const spn = f.flying ? f.rpm>250 : (!f.stopped && bat.phase==='run');
    drawBladeSprite(ctx, f.bc, f.x, f.y, f.rot, f.rad, spn);
  }
  // intro overlay
  if(bat.phase==='intro'){
    ctx.setTransform(1,0,0,1,0,0);
    ctx.fillStyle='rgba(246,239,224,.72)'; ctx.fillRect(0,0,cv.width,cv.height);
    ctx.textAlign='center';
    ctx.font='700 13px Georgia,serif'; ctx.fillStyle='#8d8271';
    ctx.fillText('隊伍一', cv.width/2, cv.height/2-84);
    ctx.font='900 28px Georgia,serif'; ctx.fillStyle='#5c7350';
    ctx.fillText(bat.p.blade.name+(bat.p.spinDir==='L'?' ↺':' ↻'), cv.width/2, cv.height/2-58);
    ctx.font='900 italic 40px Georgia,serif'; ctx.fillStyle='#c96f4e';
    ctx.fillText('VS', cv.width/2, cv.height/2+8);
    ctx.font='700 13px Georgia,serif'; ctx.fillStyle='#8d8271';
    ctx.fillText('隊伍二', cv.width/2, cv.height/2+44);
    ctx.font='900 28px Georgia,serif'; ctx.fillStyle='#a4543a';
    ctx.fillText(bat.e.blade.name+(bat.e.spinDir==='L'?' ↺':' ↻'), cv.width/2, cv.height/2+70);
  }
}

const STARTERS = [
  {name:'金神杖', key:'staff',   innate:{power:74,weight:60,tough:62}, spinDir:'R'},
  {name:'帥喵',   key:'shuai',   innate:{power:68,weight:56,tough:58}, spinDir:'R'},
  {name:'同學',   key:'tongxue', innate:{power:58,weight:62,tough:63}, spinDir:'L'},
];
function ensureStarters(){
  if(DB.blades.length) return Promise.resolve();
  return Promise.all(STARTERS.map(s=>new Promise(res=>{
    const im = new Image();
    im.onload = ()=>{
      const c = document.createElement('canvas'); c.width=c.height=300;
      const x = c.getContext('2d');
      const sc = Math.min(300/im.width, 300/im.height);
      x.drawImage(im,(300-im.width*sc)/2,(300-im.height*sc)/2,im.width*sc,im.height*sc);
      res(forgeBlade(c,{useAlpha:true, innate:s.innate, name:s.name, spinDir:s.spinDir}));
    };
    im.onerror = ()=>res(null);
    im.src = STARTER_IMGS[s.key];
  }))).then(list=>{
    list.filter(Boolean).forEach(b=>DB.blades.push(b));
    dbSave();
  });
}

/* nav wiring */
$$('[data-nav]').forEach(btn=>btn.addEventListener('click', ()=>{
  const nv=btn.dataset.nav; ac();
  if(nv==='capture'){ capStep('pick'); show('scr-capture'); }
  else if(nv==='collection'){ renderCollection(); show('scr-collection'); }
  else if(nv==='arena'){ openArena(); }
  else if(nv==='formal'){ openSelect('formal'); }
  else if(nv==='single'){ openSelect('single'); }
}));
$$('[data-back]').forEach(btn=>btn.addEventListener('click', ()=>{
  cancelAnimationFrame(cap.spinRAF);
  show('scr-home');
}));
$$('[data-back-col]').forEach(btn=>btn.addEventListener('click', ()=>{
  cancelAnimationFrame(detRAF);
  renderCollection(); show('scr-collection');
}));

dbLoad();
show('scr-home');
ensureStarters().then(()=>{
  if($('#scr-home').classList.contains('active')) show('scr-home');
});
</script>
